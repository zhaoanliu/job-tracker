<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48" role="img">
  <title>ApplyTrackr horizontal lockup — dark</title>
  <desc>Icon mark with ApplyTrackr wordmark for use on dark backgrounds</desc>
  <!-- Icon -->
  <rect width="48" height="48" rx="11" fill="#4f46e5"/>
  <rect x="5" y="8" width="9" height="4" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="5" y="14" width="9" height="4" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="5" y="20" width="9" height="4" rx="1.5" fill="white" opacity="0.42"/>
  <rect x="19" y="8" width="9" height="4" rx="1.5" fill="white" opacity="0.45"/>
  <rect x="19" y="14" width="9" height="4" rx="1.5" fill="white" opacity="0.65"/>
  <rect x="33" y="8" width="9" height="4" rx="1.5" fill="white" opacity="1"/>
  <rect x="33" y="14" width="9" height="4" rx="1.5" fill="white" opacity="0.75"/>
  <rect x="5" y="28" width="38" height="2" rx="1" fill="white" opacity="0.12"/>
  <rect x="5" y="28" width="26" height="2" rx="1" fill="white" opacity="0.65"/>
  <circle cx="10" cy="40" r="3" fill="white" opacity="0.25"/>
  <circle cx="24" cy="40" r="3" fill="white" opacity="0.52"/>
  <circle cx="38" cy="40" r="3" fill="white" opacity="1"/>
  <!-- Wordmark -->
  <text x="60" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#ffffff">Apply</text>
  <text x="120" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#818cf8">Trackr</text>
</svg>
