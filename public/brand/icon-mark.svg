<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>ApplyTrackr icon mark</title>
  <desc>Kanban pipeline icon with three columns of cards and stage dots</desc>
  <rect width="120" height="120" rx="24" fill="#4f46e5"/>
  <!-- Column 1 -->
  <rect x="14" y="18" width="20" height="8" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="14" y="30" width="20" height="8" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="14" y="42" width="20" height="8" rx="2.5" fill="white" opacity="0.40"/>
  <!-- Column 2 -->
  <rect x="50" y="18" width="20" height="8" rx="2.5" fill="white" opacity="0.45"/>
  <rect x="50" y="30" width="20" height="8" rx="2.5" fill="white" opacity="0.62"/>
  <!-- Column 3 — active -->
  <rect x="86" y="18" width="20" height="8" rx="2.5" fill="white" opacity="1"/>
  <rect x="86" y="30" width="20" height="8" rx="2.5" fill="white" opacity="0.75"/>
  <!-- Progress track -->
  <rect x="14" y="62" width="92" height="3" rx="1.5" fill="white" opacity="0.12"/>
  <rect x="14" y="62" width="62" height="3" rx="1.5" fill="white" opacity="0.65"/>
  <!-- Stage dots -->
  <circle cx="24" cy="84" r="5" fill="white" opacity="0.25"/>
  <line x1="29" y1="84" x2="55" y2="84" stroke="white" stroke-width="1" opacity="0.18"/>
  <circle cx="60" cy="84" r="5" fill="white" opacity="0.52"/>
  <line x1="65" y1="84" x2="91" y2="84" stroke="white" stroke-width="1" opacity="0.18"/>
  <circle cx="96" cy="84" r="5" fill="white" opacity="1"/>
</svg>
