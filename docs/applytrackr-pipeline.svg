<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 820 920" role="img">
  <title>ApplyTrackr self-healing pipeline</title>
  <desc>Five triggers plus a two-phase feature flow feed into Claude Code via GitHub Actions. The feature lane skips GitHub issue creation as issues already exist from planning.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      .th  { font-size: 13px; font-weight: 500; fill: #1e1b4b; }
      .ts  { font-size: 11px; font-weight: 400; fill: #4338ca; }
      .lbl { font-size: 11px; fill: #888780; font-family: Inter, system-ui, sans-serif; }
      .c-red    rect { fill: #FCEBEB; stroke: #A32D2D; } .c-red    .th { fill: #501313; } .c-red    .ts { fill: #A32D2D; }
      .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber  .th { fill: #412402; } .c-amber  .ts { fill: #854F0B; }
      .c-green  rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green  .th { fill: #173404; } .c-green  .ts { fill: #3B6D11; }
      .c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  .th { fill: #4A1B0C; } .c-coral  .ts { fill: #993C1D; }
      .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   .th { fill: #04342C; } .c-teal   .ts { fill: #0F6E56; }
      .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray   .th { fill: #2C2C2A; } .c-gray   .ts { fill: #5F5E5A; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th { fill: #26215C; } .c-purple .ts { fill: #534AB7; }
      .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue   .th { fill: #042C53; } .c-blue   .ts { fill: #185FA5; }
    </style>
  </defs>

  <!-- ── ROW 1: 4 automated triggers ── -->
  <g class="c-red">
    <rect x="40" y="40" width="108" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="94" y="61" text-anchor="middle" dominant-baseline="central">Production error</text>
    <text class="ts" x="94" y="79" text-anchor="middle" dominant-baseline="central">Sentry monitor</text>
  </g>
  <g class="c-amber">
    <rect x="158" y="40" width="108" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="212" y="61" text-anchor="middle" dominant-baseline="central">CI failure</text>
    <text class="ts" x="212" y="79" text-anchor="middle" dominant-baseline="central">lint · build · tests</text>
  </g>
  <g class="c-green">
    <rect x="276" y="40" width="108" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="330" y="58" text-anchor="middle" dominant-baseline="central">E2E failure</text>
    <text class="ts" x="330" y="74" text-anchor="middle" dominant-baseline="central">nightly ·</text>
    <text class="ts" x="330" y="88" text-anchor="middle" dominant-baseline="central">path-triggered</text>
  </g>
  <g class="c-coral">
    <rect x="394" y="40" width="108" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="448" y="61" text-anchor="middle" dominant-baseline="central">Deploy failure</text>
    <text class="ts" x="448" y="79" text-anchor="middle" dominant-baseline="central">Vercel webhook</text>
  </g>

  <!-- ── RIGHT LANE: Two entry points ── -->
  <!-- Entry A: User feedback cx=572 -->
  <g class="c-teal">
    <rect x="512" y="40" width="120" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="572" y="57" text-anchor="middle" dominant-baseline="central">User feedback</text>
    <text class="ts" x="572" y="73" text-anchor="middle" dominant-baseline="central">user-requested label</text>
  </g>
  <!-- Entry B: Owner planned cx=708 -->
  <g class="c-teal">
    <rect x="648" y="40" width="120" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="708" y="57" text-anchor="middle" dominant-baseline="central">Owner planned</text>
    <text class="ts" x="708" y="73" text-anchor="middle" dominant-baseline="central">/plan-feature</text>
  </g>

  <!-- Arrows A and B down then merge at cx=640 y=148 -->
  <line x1="572" y1="92" x2="572" y2="148" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="708" y1="92" x2="708" y2="148" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M 572 148 L 640 148" fill="none" stroke="#888780" stroke-width="0.5"/>
  <path d="M 708 148 L 640 148" fill="none" stroke="#888780" stroke-width="0.5"/>
  <line x1="640" y1="148" x2="640" y2="168" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Phase 1 — Design (gray) y=168 -->
  <g class="c-gray">
    <rect x="556" y="168" width="168" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="640" y="185" text-anchor="middle" dominant-baseline="central">Phase 1 — Design</text>
    <text class="ts" x="640" y="203" text-anchor="middle" dominant-baseline="central">status: approved</text>
    <text class="ts" x="640" y="219" text-anchor="middle" dominant-baseline="central">Claude generates design #Y</text>
  </g>
  <line x1="640" y1="232" x2="640" y2="256" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Design review (purple) y=256 -->
  <g class="c-purple">
    <rect x="556" y="256" width="168" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="640" y="273" text-anchor="middle" dominant-baseline="central">Design review</text>
    <text class="ts" x="640" y="291" text-anchor="middle" dominant-baseline="central">iterate in Claude Code</text>
    <text class="ts" x="640" y="307" text-anchor="middle" dominant-baseline="central">status: design-review</text>
  </g>
  <line x1="640" y1="320" x2="640" y2="344" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 — Implement (gray) y=344 -->
  <g class="c-gray">
    <rect x="556" y="344" width="168" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="640" y="361" text-anchor="middle" dominant-baseline="central">Phase 2 — Implement</text>
    <text class="ts" x="640" y="379" text-anchor="middle" dominant-baseline="central">status: auto-implement</text>
    <text class="ts" x="640" y="395" text-anchor="middle" dominant-baseline="central">on #X or #Y</text>
  </g>

  <!-- Arrow: Phase 2 → Claude Code row (y=556), bypassing GitHub issue row -->
  <!-- Path goes down then left to hit Claude Code box -->
  <path d="M 640 408 L 640 546 L 500 546 L 500 576" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ── Arrows: 4 auto triggers → GitHub issue (y=468) ── -->
  <line x1="94"  y1="92"  x2="94"  y2="468" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="212" y1="92"  x2="212" y2="468" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="104" x2="330" y2="468" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="448" y1="92"  x2="448" y2="468" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── ROW 2: GitHub issue ── -->
  <g class="c-gray">
    <rect x="40" y="468" width="500" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="290" y="490" text-anchor="middle" dominant-baseline="central">GitHub issue auto-created</text>
  </g>
  <line x1="290" y1="512" x2="290" y2="556" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── ROW 3: Claude Code ── -->
  <g class="c-purple">
    <rect x="80" y="556" width="420" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="290" y="577" text-anchor="middle" dominant-baseline="central">Claude Code</text>
    <text class="ts" x="290" y="596" text-anchor="middle" dominant-baseline="central">diagnoses · fixes · implements via GitHub Actions</text>
  </g>
  <line x1="290" y1="612" x2="290" y2="656" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── ROW 4: Pull request ── -->
  <g class="c-blue">
    <rect x="135" y="656" width="310" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="290" y="672" text-anchor="middle" dominant-baseline="central">Pull request</text>
    <text class="ts" x="290" y="690" text-anchor="middle" dominant-baseline="central">automated CI checks</text>
  </g>
  <path d="M 202 700 L 122 740" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M 378 700 L 458 740" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="134" y="728" text-anchor="middle" class="lbl">low-risk fix</text>
  <text x="446" y="728" text-anchor="middle" class="lbl">feature / high-risk</text>

  <!-- ── ROW 5: Auto-merge + Human review ── -->
  <g class="c-green">
    <rect x="30" y="744" width="170" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="115" y="766" text-anchor="middle" dominant-baseline="central">Auto-merged</text>
  </g>
  <g class="c-gray">
    <rect x="380" y="744" width="170" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="465" y="766" text-anchor="middle" dominant-baseline="central">Human review</text>
  </g>
  <path d="M 115 788 L 238 832" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M 465 788 L 342 832" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── ROW 6: Shipped to production ── -->
  <g class="c-teal">
    <rect x="170" y="836" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="290" y="858" text-anchor="middle" dominant-baseline="central">Shipped to production</text>
  </g>

  <!-- Skip label on dashed arrow -->
  <text x="660" y="486" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888780" text-anchor="start">issues already exist</text>

</svg>
