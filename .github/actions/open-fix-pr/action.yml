name: Open Fix PR
description: >
  Commit staged changes to a new branch, open a PR with risk-based auto-merge,
  and post the result as an issue comment.
  Reads issue title from /tmp/issue_title.txt, risk from /tmp/risk.txt,
  and Claude's summary from /tmp/summary.txt.

inputs:
  issue-number:
    description: GitHub issue number
    required: true
  gh-pat:
    description: GitHub PAT used for PR creation and merge
    required: true
  branch-prefix:
    description: 'Branch name prefix; branch becomes "{prefix}{issue-number}-{timestamp}"'
    required: false
    default: 'fix/issue-'
  commit-message:
    description: 'Commit message prefix; final message is "{commit-message} #{issue-number}"'
    required: false
    default: 'fix: auto-fix for issue'
  ci-passed:
    description: 'Whether local CI checks passed; "false" opens a draft PR instead of a regular one'
    required: false
    default: 'true'
  extra-pr-note:
    description: Additional note appended to the PR body after the risk assessment line
    required: false
    default: ''
  merge-flags:
    description: 'Extra space-separated flags for gh pr merge (e.g. "--delete-branch")'
    required: false
    default: ''
  merge-comment-suffix:
    description: Text appended to the auto-merge enabled issue comment
    required: false
    default: ''

outputs:
  pr-url:
    description: URL of the created PR
    value: ${{ steps.open.outputs.pr_url }}

runs:
  using: composite
  steps:
    - name: Commit, push, open PR, and comment
      id: open
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        GH_PAT: ${{ inputs.gh-pat }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        COMMIT_MSG: ${{ inputs.commit-message }}
        CI_PASS: ${{ inputs.ci-passed }}
        EXTRA_PR_NOTE: ${{ inputs.extra-pr-note }}
        MERGE_FLAGS: ${{ inputs.merge-flags }}
        MERGE_COMMENT_SUFFIX: ${{ inputs.merge-comment-suffix }}
      run: |
        set -euo pipefail

        ISSUE_TITLE=$(cat /tmp/issue_title.txt)
        RISK=$(cat /tmp/risk.txt 2>/dev/null | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
        RISK=${RISK:-high}

        # Calculate change stats before committing (captures all unstaged + untracked changes)
        FILES_CHANGED=$({ git diff --name-only; git ls-files --others --exclude-standard; } | wc -l | tr -d ' ')
        STATS=$(git diff --shortstat)
        INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
        DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
        TOTAL_LINES=$(( ${INSERTIONS:-0} + ${DELETIONS:-0} ))

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="${BRANCH_PREFIX}${ISSUE_NUMBER}-$(date +%s)"
        git checkout -b "$BRANCH"
        git add -A
        git commit -m "${COMMIT_MSG} #${ISSUE_NUMBER}"
        git push origin "$BRANCH"

        if [[ "${CI_PASS}" != "true" ]]; then
          {
            echo "Closes #${ISSUE_NUMBER}"
            echo ""
            echo "⚠️ Claude attempted a fix but local CI still fails after multiple attempts. This draft PR is a starting point — human investigation is required to complete the fix."
            if [[ -s /tmp/summary.txt ]]; then
              echo ""
              cat /tmp/summary.txt
            fi
          } > /tmp/pr_body.txt
          PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
            --draft \
            --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file /tmp/pr_body.txt \
            --base main)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual investigation required" || true  # || true: label add is best-effort
          {
            if [[ -s /tmp/summary.txt ]]; then
              cat /tmp/summary.txt
              echo ""
            fi
            echo "Claude attempted a fix but could not get CI to pass. A draft PR has been opened as a starting point: $PR_URL — human investigation required."
          } > /tmp/issue_comment.txt
        else
          {
            echo "Closes #${ISSUE_NUMBER}"
            echo ""
            echo "**Risk assessment:** \`${RISK}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed)"
            if [[ -n "$EXTRA_PR_NOTE" ]]; then
              echo ""
              echo "$EXTRA_PR_NOTE"
            fi
            if [[ -s /tmp/summary.txt ]]; then
              echo ""
              cat /tmp/summary.txt
            fi
          } > /tmp/pr_body.txt
          PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
            --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file /tmp/pr_body.txt \
            --base main)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          MERGE_ARGS=(--auto --squash)
          if [[ -n "$MERGE_FLAGS" ]]; then
            read -ra EXTRA_FLAGS <<< "$MERGE_FLAGS"
            MERGE_ARGS+=("${EXTRA_FLAGS[@]}")
          fi

          if [[ "$RISK" == "low" && "$FILES_CHANGED" -le 2 && "$TOTAL_LINES" -le 20 ]]; then
            if GH_TOKEN="${GH_PAT}" gh pr merge "${MERGE_ARGS[@]}" "$PR_URL"; then
              MERGE_STATUS="Fix proposed and auto-merge enabled: $PR_URL — will merge to \`main\` once CI passes."
              if [[ -n "$MERGE_COMMENT_SUFFIX" ]]; then
                MERGE_STATUS="${MERGE_STATUS} ${MERGE_COMMENT_SUFFIX}"
              fi
            else
              GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual merge required" || true  # || true: label add is best-effort
              MERGE_STATUS="Fix proposed (auto-merge unavailable — manual merge required): $PR_URL"
            fi
          else
            GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual merge required" || true  # || true: label add is best-effort
            MERGE_STATUS="A fix has been proposed: $PR_URL — please review before merging."
          fi

          {
            if [[ -s /tmp/summary.txt ]]; then
              cat /tmp/summary.txt
              echo ""
            fi
            echo "$MERGE_STATUS"
          } > /tmp/issue_comment.txt
        fi

        gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
