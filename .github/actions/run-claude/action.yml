name: Run Claude Code
description: Run claude with exponential-backoff retry on 529/overload errors

inputs:
  anthropic-api-key:
    description: Anthropic API key
    required: true
  prompt-file:
    description: Path to the prompt file passed to claude -p
    required: false
    default: '/tmp/prompt.txt'
  max-turns:
    description: Maximum number of turns (--max-turns flag)
    required: false
    default: '20'
  max-attempts:
    description: Maximum retry attempts on overload errors
    required: false
    default: '3'
  extra-flags:
    description: Extra flags appended to the claude command (e.g. --dangerously-skip-permissions)
    required: false
    default: ''
  output-file:
    description: File to capture claude stdout+stderr
    required: false
    default: '/tmp/claude_output.txt'

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        PROMPT_FILE: ${{ inputs.prompt-file }}
        MAX_TURNS: ${{ inputs.max-turns }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        EXTRA_FLAGS: ${{ inputs.extra-flags }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        DELAY=30
        for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
          CLAUDE_ARGS=(--max-turns "$MAX_TURNS" -p "$(cat "$PROMPT_FILE")")
          if [[ -n "$EXTRA_FLAGS" ]]; then
            read -ra EXTRA <<< "$EXTRA_FLAGS"
            CLAUDE_ARGS+=("${EXTRA[@]}")
          fi
          set +e +o pipefail
          claude "${CLAUDE_ARGS[@]}" 2>&1 | tee "$OUTPUT_FILE"
          CLAUDE_EXIT=${PIPESTATUS[0]}
          set -e -o pipefail
          if [[ $CLAUDE_EXIT -eq 0 ]]; then break; fi
          if grep -q "529\|Overloaded\|at capacity" "$OUTPUT_FILE" && [[ $attempt -lt $MAX_ATTEMPTS ]]; then
            echo "API overloaded (attempt $attempt/$MAX_ATTEMPTS), retrying in ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))
          else
            echo "claude exited with code $CLAUDE_EXIT (attempt $attempt/$MAX_ATTEMPTS), continuing"
            break
          fi
        done
