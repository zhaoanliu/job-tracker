name: Run Claude Code
description: Run claude with exponential-backoff retry on 529/overload errors

inputs:
  anthropic-api-key:
    description: Anthropic API key
    required: true
  prompt-file:
    description: Path to the prompt file passed to claude -p
    required: false
    default: '/tmp/prompt.txt'
  max-turns:
    description: Maximum number of turns (--max-turns flag)
    required: false
    default: '20'
  max-attempts:
    description: Maximum retry attempts on overload errors
    required: false
    default: '3'
  extra-flags:
    description: Extra flags appended to the claude command (e.g. --dangerously-skip-permissions)
    required: false
    default: ''
  output-file:
    description: File to capture claude stdout+stderr
    required: false
    default: '/tmp/claude_output.txt'

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        PROMPT_FILE: ${{ inputs.prompt-file }}
        MAX_TURNS: ${{ inputs.max-turns }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        EXTRA_FLAGS: ${{ inputs.extra-flags }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        bash "$GITHUB_ACTION_PATH/../../scripts/run-claude-retry.sh" \
          "$PROMPT_FILE" "$MAX_TURNS" "$OUTPUT_FILE" "$MAX_ATTEMPTS" "$EXTRA_FLAGS"
