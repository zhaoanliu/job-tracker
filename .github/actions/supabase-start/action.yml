name: Start local Supabase
description: Start Supabase with up to 3 retries on transient health-check failures (e.g. edge runtime 502).

runs:
  using: composite
  steps:
    - name: Start local Supabase
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if supabase start; then
            break
          fi
          if [[ $attempt -lt 3 ]]; then
            echo "supabase start failed (attempt $attempt/3), retrying in 30s..."
            supabase stop || true
            sleep 30
          else
            echo "supabase start failed after 3 attempts"
            exit 1
          fi
        done
