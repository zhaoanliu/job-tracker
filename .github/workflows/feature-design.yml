name: "Feature: design"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to design'
        required: true
        type: string

jobs:
  # ── Phase 1: generate design proposal ────────────────────────────────────
  design:
    if: "(github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner) || (github.event_name == 'issues' && github.event.label.name == 'status: approved')"
    runs-on: ubuntu-latest
    concurrency:
      group: feature-design-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude

      - name: Resolve issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "ISSUE_TITLE=$ISSUE_TITLE"
            echo 'ISSUE_BODY<<BODY_EOF'
            echo "$ISSUE_BODY"
            echo 'BODY_EOF'
          } >> "$GITHUB_ENV"

      - name: Resolve direction (route #Y → #X if implementation label)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_LABELS=$(gh issue view "${ISSUE_NUMBER}" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$ISSUE_LABELS" | grep -q "implementation"; then
            # Labeled issue is #Y — find #X via "See user-facing issue: #N"
            FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'See user-facing issue: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            if [[ -z "$FEATURE_NUMBER" ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Could not find the linked feature issue. Please add \`status: approved\` to the original feature request instead."
              exit 0
            fi
            # Remove label from #Y, switch focus to #X
            gh issue edit "${ISSUE_NUMBER}" --remove-label "status: approved" 2>/dev/null || true
            ISSUE_NUMBER="$FEATURE_NUMBER"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
            {
              echo "ISSUE_NUMBER=$ISSUE_NUMBER"
              echo "ISSUE_TITLE=$ISSUE_TITLE"
              echo 'ISSUE_BODY<<BODY_EOF'
              echo "$ISSUE_BODY"
              echo 'BODY_EOF'
            } >> "$GITHUB_ENV"
          fi

      - name: Swap label to design-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" \
            --remove-label "status: approved" 2>/dev/null || \
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" 2>/dev/null || true

      - name: Check for existing implementation spec
        id: existing_spec
        run: |
          EXISTING=$(echo "${ISSUE_BODY}" | grep -oE 'Technical tracking: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [[ -n "$EXISTING" ]]; then
            echo "design_number=${EXISTING}" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Link existing implementation spec
        if: steps.existing_spec.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DESIGN_NUMBER="${{ steps.existing_spec.outputs.design_number }}"
          DESIGN_URL="https://github.com/${GITHUB_REPOSITORY}/issues/${DESIGN_NUMBER}"
          {
            echo "Implementation spec found from /plan-feature: ${DESIGN_URL}"
            echo ""
            echo "Review and refine the spec in a Claude Code session if needed. When ready, add \`status: auto-implement\` to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt

      - name: Comment that design is starting
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Generating a design proposal for this feature. A design issue will be linked here shortly."

      - name: Write design prompt
        if: steps.existing_spec.outputs.exists != 'true'
        run: |
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          printf '%s' "${ISSUE_BODY}" > /tmp/issue_body.txt
          cat > /tmp/design_prompt.txt << EOF
          A user-submitted feature request (issue #${ISSUE_NUMBER}) has been approved for design.

          Feature: ${FEATURE_TITLE}

          User's request:
          $(cat /tmp/issue_body.txt)

          Produce a detailed implementation design proposal and write it to /tmp/design_proposal.md.

          The design document must include these sections:

          ## What the user wants
          Restate the requirement in plain language. If the request is ambiguous, call out the ambiguity.

          ## Proposed implementation
          Describe the technical approach in 2-3 sentences.

          ### Files to modify or create
          Bullet list — one line per file with what changes and why.

          ### UI changes
          For any user-visible change: which component, where exactly in the UI it appears, and how the user interacts with it. If there is no UI change, state that explicitly and explain why the feature is complete without one.

          ## Implementation order
          Numbered list of discrete implementation steps in the order they must be done, with explicit dependencies called out (e.g. "Step 2 depends on Step 1 being merged first"). Each step should be small enough to review independently. If steps are independent and can be done in any order, say so.

          ## Design decisions
          For each non-obvious choice in the proposed implementation, state: (a) what was chosen, (b) the main alternative considered, and (c) why the chosen approach is better for this codebase. Skip decisions where the choice is obvious or has no meaningful alternative.

          ## Acceptance criteria
          Checklist of what a human tester must be able to do to confirm the feature is working. At least one item must be a user-visible action (e.g. "User can click X and see Y").

          ## Open questions
          List any decisions that require owner input before implementation begins. If none, write "None."

          Do not implement anything. Write only the design document.

          Next.js route constraint: Next.js route files (app/**/route.ts) only allow HTTP method exports (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS). Any other named export causes a production build failure that tsc and ESLint do not catch. If the design requires a helper function that tests will import directly, that function must live in lib/ — never exported from the route file itself.
          EOF

      - name: Run Claude to generate design
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --max-turns 20 -p "$(cat /tmp/design_prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then break; fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              break
            fi
          done

      - name: Create design issue and link back
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -s /tmp/design_proposal.md ]]; then
            gh label create "user review required" --force 2>/dev/null || true
            gh issue edit "${ISSUE_NUMBER}" \
              --add-label "user review required" \
              --remove-label "status: design-review" 2>/dev/null || true
            FAILURE_TAIL=$(tail -50 /tmp/claude_output.txt 2>/dev/null || echo "(no output captured)")
            {
              echo "Design generation failed — Claude did not produce a proposal."
              echo ""
              echo "Run \`/triage-user-request ${ISSUE_NUMBER}\` in a Claude Code session to clarify requirements before retrying."
              echo ""
              echo "<details><summary>Claude output</summary>"
              echo ""
              echo '```'
              echo "${FAILURE_TAIL}"
              echo '```'
              echo ""
              echo "</details>"
            } > /tmp/failure_comment.txt
            gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/failure_comment.txt
            exit 0
          fi

          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')

          {
            echo "_Design for feature request #${ISSUE_NUMBER}: ${ISSUE_TITLE}_"
            echo ""
            cat /tmp/design_proposal.md
          } > /tmp/design_body.txt

          DESIGN_URL=$(gh issue create \
            --title "Design proposal: ${FEATURE_TITLE}" \
            --body-file /tmp/design_body.txt \
            --label "user review required,implementation")
          DESIGN_NUMBER=$(echo "$DESIGN_URL" | grep -oE '[0-9]+$')

          {
            echo "Design proposal ready for review: ${DESIGN_URL}"
            echo ""
            echo "Discuss and refine the design (ad-hoc in a Claude Code session works well). When the design looks good, add \`status: auto-implement\` to this issue to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt
