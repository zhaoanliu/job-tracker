name: "Feature: design"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to design'
        required: true
        type: string

jobs:
  # ── Phase 1: generate design proposal ────────────────────────────────────
  design:
    if: "(github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner) || (github.event_name == 'issues' && github.event.label.name == 'status: approved')"
    runs-on: ubuntu-latest
    concurrency:
      group: feature-design-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: true
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude

      - name: Resolve issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "ISSUE_TITLE=$ISSUE_TITLE"
            echo 'ISSUE_BODY<<BODY_EOF'
            echo "$ISSUE_BODY"
            echo 'BODY_EOF'
          } >> "$GITHUB_ENV"

      - name: Resolve direction (route #Y → #X if implementation label)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_LABELS=$(gh issue view "${ISSUE_NUMBER}" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$ISSUE_LABELS" | grep -q "implementation"; then
            # Labeled issue is #Y — find #X via "See user-facing issue: #N"
            FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'See user-facing issue: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            if [[ -z "$FEATURE_NUMBER" ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Could not find the linked feature issue. Please add \`status: approved\` to the original feature request instead."
              exit 0
            fi
            # Remove label from #Y, switch focus to #X
            gh issue edit "${ISSUE_NUMBER}" --remove-label "status: approved" 2>/dev/null || true
            ISSUE_NUMBER="$FEATURE_NUMBER"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
            {
              echo "ISSUE_NUMBER=$ISSUE_NUMBER"
              echo "ISSUE_TITLE=$ISSUE_TITLE"
              echo 'ISSUE_BODY<<BODY_EOF'
              echo "$ISSUE_BODY"
              echo 'BODY_EOF'
            } >> "$GITHUB_ENV"
          fi

      - name: Swap label to design-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" \
            --remove-label "status: approved" 2>/dev/null || \
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" 2>/dev/null || true

      - name: Check for existing implementation spec
        id: existing_spec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=""

          # 1. Body contains "Technical tracking: #N" (manually cross-linked pairs)
          EXISTING=$(echo "${ISSUE_BODY}" | grep -oE 'Technical tracking: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)

          # 2. A previous completed run posted "<!-- design-issue: N -->" in a comment
          if [[ -z "$EXISTING" ]]; then
            EXISTING=$(gh issue view "${ISSUE_NUMBER}" --comments --json comments \
              --jq '[.comments[].body | select(contains("design-issue:"))] | last' \
              | grep -oE 'design-issue: [0-9]+' | grep -oE '[0-9]+' || true)
          fi

          # 3. A previous cancelled run created the design issue but never posted the comment
          if [[ -z "$EXISTING" ]]; then
            FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
            # $t is a jq variable passed via --arg, not a shell variable
            # shellcheck disable=SC2016
            EXISTING=$(gh issue list --state open --limit 50 --json number,title \
              | jq -r --arg t "Design proposal: ${FEATURE_TITLE}" \
              '.[] | select(.title == $t) | .number' | head -1 || true)
          fi

          if [[ -n "$EXISTING" ]]; then
            echo "design_number=${EXISTING}" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Link existing implementation spec
        if: steps.existing_spec.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DESIGN_NUMBER="${{ steps.existing_spec.outputs.design_number }}"
          DESIGN_URL="https://github.com/${GITHUB_REPOSITORY}/issues/${DESIGN_NUMBER}"
          {
            echo "Implementation spec found from /plan-feature: ${DESIGN_URL}"
            echo ""
            echo "Review and refine the spec in a Claude Code session if needed. When ready, add \`status: auto-implement\` to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt

      - name: Comment that design is starting
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Generating a design proposal for this feature. A design issue will be linked here shortly."

      - name: Write design prompt
        if: steps.existing_spec.outputs.exists != 'true'
        run: |
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          printf '%s' "${ISSUE_BODY}" > /tmp/issue_body.txt
          cat > /tmp/design_prompt.txt << EOF
          A user-submitted feature request (issue #${ISSUE_NUMBER}) has been approved for design.

          Feature: ${FEATURE_TITLE}

          User's request:
          $(cat /tmp/issue_body.txt)

          Before writing the design, you MUST complete the following research steps:

          1. Read the existing codebase. Identify which files the feature will touch, then read them with the Read tool. At minimum read the 2-3 source files most likely to be modified. Do not skip this — the design must reflect what the code actually does, not assumptions about it.

          2. Investigate any external services or URLs mentioned in the request. If the request involves a third-party website, API, or URL pattern:
             - Fetch the URL(s) with Bash (curl -s -L with a realistic User-Agent) to see what the server actually returns
             - Inspect the response for structured data (JSON-LD, inline JSON blobs, API endpoint references in JS bundle script src attributes)
             - Check whether the site uses a known ATS or service backend (Greenhouse, Lever, Workday, Eightfold, Workable, iCIMS, etc.) by looking for references in the page HTML or JS bundle filenames
             - If you find an ATS backend, test its API directly (e.g. boards-api.greenhouse.io, api.lever.co) to confirm you can retrieve structured job data without JavaScript execution
             - Do NOT trust user-stated assumptions about how a site works (e.g. "fully JavaScript-rendered") without verifying them yourself

          3. Ground your design in what you found. The implementation must reflect actual observed behavior. If investigation reveals a simpler approach than what the user described (e.g. an existing API rather than an HTML parser), design the simpler approach and note the discrepancy.

          Only after completing this research should you write the design proposal. Write the design to /tmp/design_proposal.md.

          The design document must include these sections:

          ## What the user wants
          Restate the requirement in plain language. If the request is ambiguous, call out the ambiguity.

          ## Proposed implementation
          Describe the technical approach in 2-3 sentences.

          ### Files to modify or create
          Bullet list — one line per file with what changes and why.

          ### UI changes
          For any user-visible change: which component, where exactly in the UI it appears, and how the user interacts with it. If there is no UI change, state that explicitly and explain why the feature is complete without one.

          ## Implementation plan

          List discrete implementation steps that Claude Code will execute during the implement phase. Output this section in EXACTLY the format shown below — the JSON in the HTML comment is machine-parsed by the implement workflow and must be valid.

          CRITICAL: each object's "id" field MUST equal the step number in the corresponding "Step N:" checkbox (id:1 → "Step 1:", id:2 → "Step 2:", etc.). The implement workflow uses this to tick off checkboxes as each step completes.

          <!-- implementation-plan-json
          [
            {"id":1,"title":"<one-line title>","scope":"<what to implement — specific enough that no research is needed>","files_to_create":["path/to/new/file.ts"],"files_to_modify":[],"test_file":"__tests__/path/to/test.ts","estimated_turns":10},
            {"id":2,"title":"<one-line title>","scope":"<what to implement>","files_to_create":[],"files_to_modify":["path/to/existing/file.ts"],"test_file":"__tests__/path/to/test.ts","estimated_turns":15}
          ]
          -->

          - [ ] **Step 1: <title>** (~<N> turns) — <one-sentence scope summary>
          - [ ] **Step 2: <title>** (~<N> turns) — <one-sentence scope summary>

          Sizing rules for estimated_turns (MUST be <= 25 — split any step that would exceed this):
          - 10-15 turns: simple API route or isolated UI change (1-2 files)
          - 15-25 turns: component with multiple interactions or data flow (2-3 files)
          Each test_file is a single path under __tests__/; files_to_create and files_to_modify are relative paths from repo root; call out step dependencies (e.g. "Step 2 depends on Step 1") explicitly.

          Fixture import rule: JSON fixtures are imported with a standard ES import. Non-JSON fixtures (e.g. raw HTML responses from ATS endpoints) must be loaded with readFileSync from node:fs — never with the ?raw Vite import suffix, which is Vite-specific and would break if the build config changes. Example for an HTML fixture: add "import { readFileSync } from 'node:fs'" and "import { join } from 'node:path'" at the top of the test file, then load with "const html = readFileSync(join(__dirname, '../fixtures/name.html'), 'utf-8')".

          ## Design decisions
          For each non-obvious choice in the proposed implementation, state: (a) what was chosen, (b) the main alternative considered, and (c) why the chosen approach is better for this codebase. Skip decisions where the choice is obvious or has no meaningful alternative.

          ## Acceptance criteria
          Checklist of behaviors the verify-ac workflow will test automatically with Playwright or unit tests.
          Only include items where ALL inputs are under our control in a test environment:
          - UI interactions and visible state on localhost:3000
          - Network interception (page.route() to mock API responses, simulate errors, or assert a call was/was not made)
          - Local Supabase data and auth state
          Do NOT include anything that depends on live external state. If an item requires a real URL, a real email,
          or a live third-party API response to verify, it belongs in Human verification steps instead.
          At least one item must be a user-visible UI interaction.

          ## Human verification steps
          Checklist for the PR reviewer to verify manually before merging.
          Only include items that depend on live external state that can change independently of the code:
          real URLs or job postings that may go stale, real email receipt, live API responses with real data.
          If none exist, write "None."

          ## Open questions
          Before listing any question here, attempt to resolve it using the tools available to you (Read, Bash). Any question answerable by reading a file, fetching a URL, or grepping the codebase is NOT a valid open question — resolve it yourself first. Only list questions that require information genuinely impossible to obtain through investigation: proprietary credentials, business-scope decisions, or configuration specific to the owner's account. If none remain after investigation, write "None."

          Do not implement anything. Write only the design document.

          Next.js route constraint: Next.js route files (app/**/route.ts) only allow HTTP method exports (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS). Any other named export causes a production build failure that tsc and ESLint do not catch. If the design requires a helper function that tests will import directly, that function must live in lib/ — never exported from the route file itself.
          EOF

      - name: Run Claude to generate design
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" --max-turns 30 -p "$(cat /tmp/design_prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then break; fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              break
            fi
          done

      - name: Commit design file to .github/designs
        if: steps.existing_spec.outputs.exists != 'true'
        run: |
          if [[ ! -s /tmp/design_proposal.md ]]; then
            echo "No design proposal — skipping commit"
            exit 0
          fi
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          SLUG=$(printf '%s' "${FEATURE_TITLE}" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]' '-' | sed 's/^-//;s/-$//' | cut -c1-50)
          DESIGN_FILE=".github/designs/issue-${ISSUE_NUMBER}-${SLUG}.md"
          DESIGN_BRANCH="design/issue-${ISSUE_NUMBER}-${SLUG}"
          mkdir -p .github/designs
          {
            echo "_Design for feature request #${ISSUE_NUMBER}: ${ISSUE_TITLE}_"
            echo ""
            cat /tmp/design_proposal.md
          } > "${DESIGN_FILE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "${DESIGN_BRANCH}"
          git add "${DESIGN_FILE}"
          git commit -m "design: add proposal for #${ISSUE_NUMBER} (${FEATURE_TITLE})"
          if git push --force origin "${DESIGN_BRANCH}"; then
            {
              echo "DESIGN_FILE=${DESIGN_FILE}"
              echo "DESIGN_BRANCH=${DESIGN_BRANCH}"
            } >> "$GITHUB_ENV"
          else
            echo "Warning: could not push design branch — design file link will be omitted"
          fi

      - name: Create design issue and link back
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -s /tmp/design_proposal.md ]]; then
            gh label create "user review required" --force 2>/dev/null || true
            gh issue edit "${ISSUE_NUMBER}" \
              --add-label "user review required" \
              --remove-label "status: design-review" 2>/dev/null || true
            FAILURE_TAIL=$(tail -50 /tmp/claude_output.txt 2>/dev/null || echo "(no output captured)")
            {
              echo "Design generation failed — Claude did not produce a proposal."
              echo ""
              echo "Run \`/triage-user-request ${ISSUE_NUMBER}\` in a Claude Code session to clarify requirements before retrying."
              echo ""
              echo "<details><summary>Claude output</summary>"
              echo ""
              echo '```'
              echo "${FAILURE_TAIL}"
              echo '```'
              echo ""
              echo "</details>"
            } > /tmp/failure_comment.txt
            gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/failure_comment.txt
            exit 0
          fi

          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')

          {
            echo "_Design for feature request #${ISSUE_NUMBER}: ${ISSUE_TITLE}_"
            echo ""
            echo "> [!WARNING]"
            echo "> The \`<!-- implementation-plan-json -->\` block in the Implementation plan section is machine-parsed by the implement workflow. Edit the \`- [ ]\` checkboxes to adjust the plan — do not edit the JSON directly."
            echo ""
            cat /tmp/design_proposal.md
          } > /tmp/design_body.txt

          DESIGN_URL=$(gh issue create \
            --title "Design proposal: ${FEATURE_TITLE}" \
            --body-file /tmp/design_body.txt \
            --label "user review required,implementation")
          DESIGN_NUMBER=$(echo "$DESIGN_URL" | grep -oE '[0-9]+$')

          {
            echo "Design proposal ready for review: ${DESIGN_URL}"
            echo ""
            if [[ -n "${DESIGN_BRANCH}" ]]; then
              echo "Design file: [\`${DESIGN_FILE}\`](https://github.com/${GITHUB_REPOSITORY}/blob/${DESIGN_BRANCH}/${DESIGN_FILE})"
              echo ""
            fi
            echo "Discuss and refine the design (ad-hoc in a Claude Code session works well). When the design looks good, add \`status: auto-implement\` to this issue to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt
