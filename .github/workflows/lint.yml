name: Lint & type-check

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ format('{0}-lint', github.event_name == 'pull_request' && github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: zhaoanliu/claude-dev-automation/actions/detect-doc-only@v1.0.0
        id: detect

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Check Next.js route exports
        run: node scripts/check-route-exports.js

      - name: actionlint
        run: |
          curl -fSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint -color

      - uses: zhaoanliu/claude-dev-automation/actions/trigger-ci-failure@v1.0.0
        if: failure() && github.event_name != 'repository_dispatch'
        with:
          gh-pat: ${{ secrets.GH_PAT }}
