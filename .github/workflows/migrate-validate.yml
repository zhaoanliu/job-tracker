name: Validate DB migrations

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ format('{0}-migrate-validate', github.event_name == 'pull_request' && github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: zhaoanliu/claude-dev-automation/actions/detect-doc-only@v1.1.0
        id: detect

  migrate-validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2.1.1
        with:
          version: 2.109.1

      - uses: zhaoanliu/claude-dev-automation/actions/supabase-start@v1.1.0

      - name: Stop local Supabase
        if: always()
        run: supabase stop

      - uses: zhaoanliu/claude-dev-automation/actions/trigger-ci-failure@v1.1.0
        if: failure() && github.event_name != 'repository_dispatch'
        with:
          gh-pat: ${{ secrets.GH_PAT }}
