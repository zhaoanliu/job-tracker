name: Validate DB migrations

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_call:

jobs:
  migrate-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: 2.100.1

      - name: Start local Supabase
        run: supabase start

      - name: Stop local Supabase
        if: always()
        run: supabase stop

      - uses: ./.github/actions/trigger-ci-failure
        if: failure() && github.actor != 'github-actions[bot]'
        with:
          gh-pat: ${{ secrets.GH_PAT }}
