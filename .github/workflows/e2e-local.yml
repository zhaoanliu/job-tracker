name: E2E Local Tests (Board + CSV)

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:      # allow manual runs
    inputs:
      skip_visual:
        type: boolean
        default: false
        description: 'Skip visual regression tests (board/csv/auth still run)'
  workflow_call:
    inputs:
      skip_visual:
        type: boolean
        default: false
      needs_e2e:
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'components/board/**'
      - 'components/modals/**'
      - 'components/ui/**'
      - 'app/dashboard/**'
      - 'app/global-error.tsx'
      - 'app/not-found.tsx'
      - 'lib/utils.ts'
      - 'supabase/migrations/**'
      - 'e2e/local/**'
      - 'e2e/helpers.ts'
      - 'playwright.config.local.ts'
      - 'app/globals.css'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'

jobs:
  e2e-local:
    # Skip when called with needs_e2e=false (e2e-ac.yml passes this when no AC criteria need E2E).
    # Always runs for cron, push, and workflow_dispatch triggers.
    if: github.event_name != 'workflow_call' || inputs.needs_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v2.1.1
        with:
          version: 2.102.0

      - uses: ./.github/actions/supabase-start

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run local E2E tests
        run: |
          if [[ "${{ inputs.skip_visual }}" == "true" ]]; then
            npx playwright test --config playwright.config.local.ts \
              'e2e/local/auth.spec.ts' 'e2e/local/board.spec.ts' 'e2e/local/csv.spec.ts'
          else
            npx playwright test --config playwright.config.local.ts 'e2e/local/'
          fi
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

      - name: Stop local Supabase
        if: always()
        run: supabase stop

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-local
          path: playwright-report/
          retention-days: 7

      - name: Trigger CI auto-fix on failure
        if: failure() && github.event_name != 'repository_dispatch' && github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          jq -n \
            --arg wf "${{ github.workflow }}" \
            --arg id "${{ github.run_id }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg branch "$HEAD_BRANCH" \
            '{"event_type":"ci-failure","client_payload":{"workflow_name":$wf,"run_id":$id,"run_url":$url,"head_branch":$branch}}' \
          | gh api repos/${{ github.repository }}/dispatches --method POST --input -
