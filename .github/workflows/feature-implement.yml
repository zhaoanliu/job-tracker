name: "Feature: design and implement"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: string

jobs:
  # ── Phase 1: generate design proposal ────────────────────────────────────
  design:
    if: "github.event_name == 'issues' && github.event.label.name == 'status: approved'"
    runs-on: ubuntu-latest
    concurrency:
      group: feature-design-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude

      - name: Resolve issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "ISSUE_TITLE=$ISSUE_TITLE"
            echo 'ISSUE_BODY<<BODY_EOF'
            echo "$ISSUE_BODY"
            echo 'BODY_EOF'
          } >> "$GITHUB_ENV"

      - name: Resolve direction (route #Y → #X if implementation label)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_LABELS=$(gh issue view "${ISSUE_NUMBER}" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$ISSUE_LABELS" | grep -q "implementation"; then
            # Labeled issue is #Y — find #X via "See user-facing issue: #N"
            FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'See user-facing issue: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            if [[ -z "$FEATURE_NUMBER" ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Could not find the linked feature issue. Please add \`status: approved\` to the original feature request instead."
              exit 0
            fi
            # Remove label from #Y, switch focus to #X
            gh issue edit "${ISSUE_NUMBER}" --remove-label "status: approved" 2>/dev/null || true
            ISSUE_NUMBER="$FEATURE_NUMBER"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
            {
              echo "ISSUE_NUMBER=$ISSUE_NUMBER"
              echo "ISSUE_TITLE=$ISSUE_TITLE"
              echo 'ISSUE_BODY<<BODY_EOF'
              echo "$ISSUE_BODY"
              echo 'BODY_EOF'
            } >> "$GITHUB_ENV"
          fi

      - name: Swap label to design-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" \
            --remove-label "status: approved" 2>/dev/null || \
          gh issue edit "${ISSUE_NUMBER}" \
            --add-label "status: design-review" 2>/dev/null || true

      - name: Check for existing implementation spec
        id: existing_spec
        run: |
          EXISTING=$(echo "${ISSUE_BODY}" | grep -oE 'Technical tracking: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [[ -n "$EXISTING" ]]; then
            echo "design_number=${EXISTING}" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Link existing implementation spec
        if: steps.existing_spec.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DESIGN_NUMBER="${{ steps.existing_spec.outputs.design_number }}"
          DESIGN_URL="https://github.com/${GITHUB_REPOSITORY}/issues/${DESIGN_NUMBER}"
          {
            echo "Implementation spec found from /plan-feature: ${DESIGN_URL}"
            echo ""
            echo "Review and refine the spec in a Claude Code session if needed. When ready, add \`status: auto-implement\` to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt

      - name: Comment that design is starting
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Generating a design proposal for this feature. A design issue will be linked here shortly."

      - name: Write design prompt
        if: steps.existing_spec.outputs.exists != 'true'
        run: |
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          printf '%s' "${ISSUE_BODY}" > /tmp/issue_body.txt
          cat > /tmp/design_prompt.txt << EOF
          A user-submitted feature request (issue #${ISSUE_NUMBER}) has been approved for design.

          Feature: ${FEATURE_TITLE}

          User's request:
          $(cat /tmp/issue_body.txt)

          Produce a detailed implementation design proposal and write it to /tmp/design_proposal.md.

          The design document must include these sections:

          ## What the user wants
          Restate the requirement in plain language. If the request is ambiguous, call out the ambiguity.

          ## Proposed implementation
          Describe the technical approach in 2-3 sentences.

          ### Files to modify or create
          Bullet list — one line per file with what changes and why.

          ### UI changes
          For any user-visible change: which component, where exactly in the UI it appears, and how the user interacts with it. If there is no UI change, state that explicitly and explain why the feature is complete without one.

          ## Acceptance criteria
          Checklist of what a human tester must be able to do to confirm the feature is working. At least one item must be a user-visible action (e.g. "User can click X and see Y").

          ## Open questions
          List any decisions that require owner input before implementation begins. If none, write "None."

          Do not implement anything. Write only the design document.
          EOF

      - name: Run Claude to generate design
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --max-turns 10 -p "$(cat /tmp/design_prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then break; fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              break
            fi
          done

      - name: Create design issue and link back
        if: steps.existing_spec.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -s /tmp/design_proposal.md ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Claude did not produce a design proposal. The feature request may need more detail."
            exit 0
          fi

          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')

          {
            echo "_Design for feature request #${ISSUE_NUMBER}: ${ISSUE_TITLE}_"
            echo ""
            cat /tmp/design_proposal.md
          } > /tmp/design_body.txt

          DESIGN_URL=$(gh issue create \
            --title "Design proposal: ${FEATURE_TITLE}" \
            --body-file /tmp/design_body.txt \
            --label "user review required,implementation")
          DESIGN_NUMBER=$(echo "$DESIGN_URL" | grep -oE '[0-9]+$')

          {
            echo "Design proposal ready for review: ${DESIGN_URL}"
            echo ""
            echo "Discuss and refine the design (ad-hoc in a Claude Code session works well). When the design looks good, add \`status: auto-implement\` to this issue to kick off implementation."
            echo ""
            echo "<!-- design-issue: ${DESIGN_NUMBER} -->"
          } > /tmp/design_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/design_comment.txt

  # ── Phase 2: implement from design ───────────────────────────────────────
  implement:
    if: "(github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner) || (github.event_name == 'issues' && github.event.label.name == 'status: auto-implement')"
    runs-on: ubuntu-latest
    concurrency:
      group: feature-implement-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude

      - name: Resolve issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "ISSUE_TITLE=$ISSUE_TITLE"
            echo 'ISSUE_BODY<<BODY_EOF'
            echo "$ISSUE_BODY"
            echo 'BODY_EOF'
          } >> "$GITHUB_ENV"

      - name: Find linked design issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          DESIGN_NUMBER=""
          DESIGN_BODY=""

          # Detect direction: implementation label means the labeled issue IS the design spec (#Y)
          ISSUE_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$ISSUE_LABELS" | grep -q "implementation"; then
            # Labeled issue is #Y — find #X via back-reference in body
            DESIGN_NUMBER="$ISSUE_NUMBER"
            DESIGN_BODY="${ISSUE_BODY}"
            # plan-feature format: "See user-facing issue: #N"
            FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'See user-facing issue: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            # Phase 1 format: "Design for feature request #N"
            if [[ -z "$FEATURE_NUMBER" ]]; then
              FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'Design for feature request #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            fi
            if [[ -z "$FEATURE_NUMBER" ]]; then
              gh issue comment "$ISSUE_NUMBER" \
                --body "Could not find the linked feature issue. Please add \`status: auto-implement\` to the original feature request instead."
              exit 0
            fi
            # Update #Y labels before switching focus to #X
            gh issue edit "$ISSUE_NUMBER" --remove-label "status: auto-implement" --add-label "status: in progress" 2>/dev/null || true
            ISSUE_NUMBER="$FEATURE_NUMBER"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
            ISSUE_BODY_X=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
            {
              echo "ISSUE_NUMBER=$ISSUE_NUMBER"
              echo "ISSUE_TITLE=$ISSUE_TITLE"
              echo 'ISSUE_BODY<<BODY_EOF'
              echo "$ISSUE_BODY_X"
              echo 'BODY_EOF'
            } >> "$GITHUB_ENV"
          else
            # Labeled issue is #X — find #Y via comment tag or body link
            DESIGN_NUMBER=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
              --jq '[.comments[].body | select(contains("design-issue:"))] | last' \
              | grep -oE 'design-issue: [0-9]+' | grep -oE '[0-9]+' || true)
            # Fallback: /plan-feature links via "Technical tracking: #N" in the body
            if [[ -z "$DESIGN_NUMBER" ]]; then
              DESIGN_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'Technical tracking: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            fi
            if [[ -n "$DESIGN_NUMBER" ]]; then
              DESIGN_BODY=$(gh issue view "$DESIGN_NUMBER" --json body --jq '.body')
              gh issue edit "$DESIGN_NUMBER" --add-label "status: in progress" 2>/dev/null || true
            fi
          fi

          {
            echo "DESIGN_NUMBER=$DESIGN_NUMBER"
            echo 'DESIGN_BODY<<DESIGN_EOF'
            echo "$DESIGN_BODY"
            echo 'DESIGN_EOF'
          } >> "$GITHUB_ENV"

      - uses: ./.github/actions/check-existing-pr
        id: pr_check
        with:
          branch-prefix: feat/issue-${{ env.ISSUE_NUMBER }}-

      - name: Comment that implementation is starting
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Claude Code is implementing this feature. A PR will be opened for review when done."

      - uses: ./.github/actions/mark-in-progress
        if: steps.pr_check.outputs.skip != 'true'
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          labels-to-remove: |
            status: auto-implement
            status: design-review
            status: planned
            status: backlog

      - name: Write prompt file
        if: steps.pr_check.outputs.skip != 'true'
        run: |
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          printf '%s' "${ISSUE_BODY}" > /tmp/issue_body.txt
          printf '%s' "${DESIGN_BODY}" > /tmp/design_body.txt
          cat > /tmp/prompt.txt << EOF
          A user-submitted feature request (issue #${ISSUE_NUMBER}) has been approved for implementation.

          Feature: ${FEATURE_TITLE}

          Original request:
          $(cat /tmp/issue_body.txt)
          EOF

          if [[ -s /tmp/design_body.txt ]]; then
            cat >> /tmp/prompt.txt << EOF

          Approved design specification (issue #${DESIGN_NUMBER}):
          $(cat /tmp/design_body.txt)

          Implement the feature exactly as described in the design specification above.
          EOF
          else
            cat >> /tmp/prompt.txt << EOF

          No design issue was found — implement based on the original request.
          EOF
          fi

          cat >> /tmp/prompt.txt << EOF

          Follow the project's existing patterns and conventions.
          Do NOT run any git commands — just edit the files.
          Do NOT add code comments explaining what you changed.

          TESTS ARE REQUIRED. You must write tests for every new function and behaviour:
          - New API routes: add a test file under __tests__/app/api/ that mocks fetch and verifies the route logic (auth, error cases, happy path)
          - New or modified React components: update the existing test file under __tests__/components/ to cover every new prop, state, and conditional render
          - New utility functions: add tests under __tests__/lib/
          After writing tests, run all of the following and fix any failures before finishing:
            npm run lint
            npx tsc --noEmit
            npm run test:coverage
          Do not consider the task complete until all three pass.

          After implementing, write a markdown summary to /tmp/summary.txt with these sections:
          ## Implementation overview
          Two or three sentences: what was built and how it works.
          ## Files changed
          Bullet list — one line per file, explaining what was added or changed and why.
          ## Tests added
          One sentence describing what tests cover the new behaviour.
          EOF

      - name: Install dependencies
        if: steps.pr_check.outputs.skip != 'true'
        run: npm ci

      - name: Run Claude Code
        if: steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --max-turns 30 -p "$(cat /tmp/prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then
              break
            fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              echo "claude exited with code $CLAUDE_EXIT (attempt $attempt/3), continuing"
              break
            fi
          done

      - name: Validate tests were written
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEST_CHANGES=$({ git diff --name-only; git ls-files --others --exclude-standard; } | grep -E '__tests__/|\.test\.(ts|tsx)' || true)
          if [[ -z "$TEST_CHANGES" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Claude implemented the feature but wrote no tests. Tests are required for every new behaviour (see \`__tests__/\`). Re-add \`status: auto-implement\` to retry."
            exit 1
          fi

      - name: Run CI checks (lint, tsc, test coverage)
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          FAILURES=""
          npm run lint        || FAILURES="${FAILURES} lint"
          npx tsc --noEmit    || FAILURES="${FAILURES} tsc"
          npm run test:coverage || FAILURES="${FAILURES} test:coverage"
          if [[ -n "$FAILURES" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "CI checks failed:${FAILURES}. Re-add \`status: auto-implement\` to retry."
            exit 1
          fi

      - name: Open PR
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ALL_CHANGES=$({ git diff --name-only; git ls-files --others --exclude-standard; } || true)
          if [[ -z "$ALL_CHANGES" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Claude Code ran but made no changes. The feature may already be implemented or the request needs more detail."
            exit 0
          fi

          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          TIMESTAMP=$(date +%s)
          BRANCH="feat/issue-${ISSUE_NUMBER}-${TIMESTAMP}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: ${FEATURE_TITLE} (closes #${ISSUE_NUMBER})"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$BRANCH"

          {
            echo "Closes #${ISSUE_NUMBER}"
            if [[ -n "${DESIGN_NUMBER}" ]]; then
              echo "Closes #${DESIGN_NUMBER}"
            fi
            echo ""
            echo "Implemented by Claude Code based on approved design #${DESIGN_NUMBER:-N/A}."
            if [[ -s /tmp/summary.txt ]]; then
              echo ""
              cat /tmp/summary.txt
            fi
          } > /tmp/pr_body.txt

          PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
            --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file /tmp/pr_body.txt \
            --base main)
          GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual merge required" || true

          {
            if [[ -s /tmp/summary.txt ]]; then
              cat /tmp/summary.txt
              echo ""
            fi
            echo "Implementation ready for review: ${PR_URL}"
          } > /tmp/issue_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
