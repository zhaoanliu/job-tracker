name: "Feature: implement"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: string
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: string

jobs:
  # ── Phase 2: implement from design ───────────────────────────────────────
  implement:
    if: "github.event_name == 'workflow_call' || (github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner) || (github.event_name == 'issues' && github.event.label.name == 'status: auto-implement')"
    runs-on: ubuntu-latest
    concurrency:
      group: feature-implement-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude
        with:
          supabase-url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase-service-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Resolve issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "ISSUE_TITLE=$ISSUE_TITLE"
            echo 'ISSUE_BODY<<BODY_EOF'
            echo "$ISSUE_BODY"
            echo 'BODY_EOF'
          } >> "$GITHUB_ENV"

      - name: Find linked design issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          ISSUE_NUMBER="${EVENT_ISSUE_NUMBER:-$INPUT_ISSUE_NUMBER}"
          DESIGN_NUMBER=""
          DESIGN_BODY=""

          # Detect direction: implementation label means the labeled issue IS the design spec (#Y)
          ISSUE_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$ISSUE_LABELS" | grep -q "implementation"; then
            # Labeled issue is #Y — find #X via back-reference in body
            DESIGN_NUMBER="$ISSUE_NUMBER"
            DESIGN_BODY="${ISSUE_BODY}"
            # plan-feature format: "See user-facing issue: #N"
            FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'See user-facing issue: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            # Phase 1 format: "Design for feature request #N"
            if [[ -z "$FEATURE_NUMBER" ]]; then
              FEATURE_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'Design for feature request #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            fi
            if [[ -z "$FEATURE_NUMBER" ]]; then
              gh issue comment "$ISSUE_NUMBER" \
                --body "Could not find the linked feature issue. Please add \`status: auto-implement\` to the original feature request instead."
              exit 0
            fi
            # Update #Y labels before switching focus to #X
            gh issue edit "$ISSUE_NUMBER" --remove-label "status: auto-implement" --add-label "status: in progress" 2>/dev/null || true
            ISSUE_NUMBER="$FEATURE_NUMBER"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
            ISSUE_BODY_X=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
            {
              echo "ISSUE_NUMBER=$ISSUE_NUMBER"
              echo "ISSUE_TITLE=$ISSUE_TITLE"
              echo 'ISSUE_BODY<<BODY_EOF'
              echo "$ISSUE_BODY_X"
              echo 'BODY_EOF'
            } >> "$GITHUB_ENV"
          else
            # Labeled issue is #X — find #Y via comment tag or body link
            DESIGN_NUMBER=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
              --jq '[.comments[] | select(.body != null) | .body | select(contains("design-issue:"))] | last' \
              | grep -oE 'design-issue: [0-9]+' | grep -oE '[0-9]+' || true)
            # Fallback: /plan-feature links via "Technical tracking: #N" in the body
            if [[ -z "$DESIGN_NUMBER" ]]; then
              DESIGN_NUMBER=$(echo "${ISSUE_BODY}" | grep -oE 'Technical tracking: #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            fi
            if [[ -n "$DESIGN_NUMBER" ]]; then
              DESIGN_BODY=$(gh issue view "$DESIGN_NUMBER" --json body --jq '.body')
              gh issue edit "$DESIGN_NUMBER" --add-label "status: in progress" 2>/dev/null || true
            fi
          fi

          {
            echo "DESIGN_NUMBER=$DESIGN_NUMBER"
            echo 'DESIGN_BODY<<DESIGN_EOF'
            echo "$DESIGN_BODY"
            echo 'DESIGN_EOF'
          } >> "$GITHUB_ENV"

      - uses: ./.github/actions/check-existing-pr
        id: pr_check
        with:
          branch-prefix: feat/issue-${{ env.ISSUE_NUMBER }}-

      - name: Comment that implementation is starting
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Claude Code is implementing this feature. A PR will be opened for review when done."

      - uses: ./.github/actions/mark-in-progress
        if: steps.pr_check.outputs.skip != 'true'
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          labels-to-remove: |
            status: auto-implement
            status: design-review
            status: planned
            status: backlog

      - name: Write prompt file
        if: steps.pr_check.outputs.skip != 'true'
        run: |
          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          printf '%s' "${ISSUE_BODY}" > /tmp/issue_body.txt
          printf '%s' "${DESIGN_BODY}" > /tmp/design_body.txt
          cat > /tmp/prompt.txt << EOF
          A user-submitted feature request (issue #${ISSUE_NUMBER}) has been approved for implementation.

          Feature: ${FEATURE_TITLE}

          Original request:
          $(cat /tmp/issue_body.txt)
          EOF

          if [[ -s /tmp/design_body.txt ]]; then
            cat >> /tmp/prompt.txt << EOF

          Approved design specification (issue #${DESIGN_NUMBER}):
          $(cat /tmp/design_body.txt)

          Implement the feature exactly as described in the design specification above.
          EOF
          else
            cat >> /tmp/prompt.txt << EOF

          No design issue was found — implement based on the original request.
          EOF
          fi

          cat >> /tmp/prompt.txt << EOF

          Follow the project's existing patterns and conventions.
          Do NOT run any git commands — just edit the files.
          Do NOT add code comments explaining what you changed.

          Next.js route constraint: Next.js route files (app/**/route.ts) only allow HTTP method exports (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS). Any other named export causes a production build failure that tsc and ESLint do not catch. If you need a helper function that tests will import directly, put it in lib/ — never export it from the route file itself.

          TESTS ARE REQUIRED. You must write tests for every new function and behaviour:
          - New API routes: add a test file under __tests__/app/api/ that mocks fetch and verifies the route logic (auth, error cases, happy path)
          - New or modified React components: update the existing test file under __tests__/components/ to cover every new prop, state, and conditional render
          - New utility functions: add tests under __tests__/lib/
          After writing tests, run all of the following and fix any failures before finishing:
            npm run lint
            npx tsc --noEmit
            npm run test:coverage
          Do not consider the task complete until all three pass.

          AC TAGGING REQUIRED. The design specification above includes an "## Acceptance criteria" section. Every acceptance criterion must be covered by at least one unit test. Tag each covering test's it() description with [AC-${DESIGN_NUMBER}-N] where N is the 1-based position of that criterion (1 for first item, 2 for second, etc.). CI fails the PR if any AC item has no tagged test.
          Example: it('saves application to database [AC-${DESIGN_NUMBER}-1]', () => { ... })
          Tag any suitable existing test if it already covers the criterion; write a new test only if no existing test covers it.

          After implementing, write a markdown summary to /tmp/summary.txt with these sections:
          ## Implementation overview
          Two or three sentences: what was built and how it works.
          ## Files changed
          Bullet list — one line per file, explaining what was added or changed and why.
          ## Tests added
          One sentence describing what tests cover the new behaviour.
          EOF

      - name: Load implementation plan from design issue
        if: steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Try to parse the machine-readable plan embedded in the design issue body
          printf '%s' "${DESIGN_BODY}" > /tmp/design_body_for_parse.txt
          PLAN_JSON=$(python3 -c "import re; b=open('/tmp/design_body_for_parse.txt').read(); m=re.search(r'<!-- implementation-plan-json\s*(.*?)\s*-->', b, re.DOTALL); print(m.group(1).strip() if m else '')" 2>/dev/null || true)

          # Extract numbered AC items from design body (used for assignment + final AC subtask)
          python3 -c "import re, json; b=open('/tmp/design_body_for_parse.txt').read(); m=re.search(r'## Acceptance criteria\n(.*?)(?:\n## |\n<!--|\Z)', b, re.DOTALL); items=[l for l in (m.group(1).strip().split('\n') if m else []) if re.match(r'^- \[[ x]\] ', l)]; print(json.dumps([[i+1, re.sub(r'^- \[[ x]\] ', '', l)] for i,l in enumerate(items)]))" 2>/dev/null > /tmp/ac_items.json || echo '[]' > /tmp/ac_items.json
          AC_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/ac_items.json'))))" 2>/dev/null || echo 0)

          if echo "$PLAN_JSON" | jq -e '. | type == "array" and length > 0' > /dev/null 2>&1; then
            echo "$PLAN_JSON" > /tmp/subtasks.json
            echo "Loaded $(jq length /tmp/subtasks.json) sub-tasks from design issue implementation plan:"
            jq -r '.[] | "  \(.id). \(.title) (~\(.estimated_turns // "?") turns)"' /tmp/subtasks.json
          else
            echo "No implementation-plan-json found in design issue — running Claude to plan sub-tasks"
            {
              echo 'Break this feature into sequential implementation sub-tasks.'
              echo 'IMPORTANT: Each sub-task must have estimated_turns <= 25. Split any that would exceed this.'
              echo ''
              echo 'Output the JSON ONLY between these exact markers (no other text between them):'
              echo 'SUBTASKS_START'
              echo '[{"id":1,"title":"...","scope":"...","files_to_create":["..."],"files_to_modify":["..."],"test_file":"__tests__/...","estimated_turns":15,"ac_items":[1,2]}]'
              echo 'SUBTASKS_END'
              echo ''
              echo 'Fields:'
              echo '  id: integer (1-based)'
              echo '  title: brief task title (one line)'
              echo '  scope: detailed description of exactly what to implement — be specific enough that no research is needed'
              echo '  files_to_create: array of new file paths ([] if none)'
              echo '  files_to_modify: array of existing file paths to change ([] if none)'
              echo '  test_file: exactly one __tests__/ path for this sub-task'\''s tests'
              echo '  estimated_turns: integer turns needed (reading + coding + validation). MUST be <= 25. Split if higher.'
              echo '  ac_items: list of 1-based AC item numbers this sub-task'\''s tests must cover ([] if none assigned here)'
              echo ''
              echo 'Sizing guidelines:'
              echo '  10-15 turns: simple API route or isolated UI state change (1-2 files)'
              echo '  15-25 turns: component with multiple interactions or data flow (2-3 files)'
              echo ''
              echo '=== Feature request ==='
              cat /tmp/issue_body.txt
              if [[ -s /tmp/design_body_for_parse.txt ]]; then
                echo ''
                echo '=== Design specification ==='
                cat /tmp/design_body_for_parse.txt
              fi
              if [[ "$AC_COUNT" -gt 0 && -n "${DESIGN_NUMBER}" ]]; then
                echo ''
                echo '=== Acceptance criteria to assign ==='
                echo "Assign each AC item to the sub-task that implements the corresponding behavior (via ac_items)."
                echo "Leave an item UNASSIGNED (omit from all ac_items) only if it tests integrated behavior"
                echo "spanning multiple steps — the workflow auto-generates a final sub-task for those."
                python3 -c "import json; [print(f'{n}. {t}') for n,t in json.load(open('/tmp/ac_items.json'))]" 2>/dev/null || true
              fi
            } > /tmp/plan_prompt.txt

            DELAY=30
            for PATTEMPT in 1 2 3; do
              set +eo pipefail
              claude --max-turns 10 \
                -p "$(cat /tmp/plan_prompt.txt)" 2>&1 | tee /tmp/plan_output.txt
              PLAN_EXIT=${PIPESTATUS[0]}
              set -eo pipefail
              if [[ $PLAN_EXIT -eq 0 ]]; then break; fi
              if grep -q "529\|Overloaded\|at capacity" /tmp/plan_output.txt && [[ $PATTEMPT -lt 3 ]]; then
                echo "API overloaded (attempt $PATTEMPT/3), retrying in ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              else
                break
              fi
            done

            sed -n '/SUBTASKS_START/,/SUBTASKS_END/{ /SUBTASKS_START/d; /SUBTASKS_END/d; p }' \
              /tmp/plan_output.txt > /tmp/subtasks_raw.txt

            if jq -e '. | type == "array" and length > 0' /tmp/subtasks_raw.txt > /dev/null 2>&1; then
              cp /tmp/subtasks_raw.txt /tmp/subtasks.json
              echo "Planned $(jq length /tmp/subtasks.json) sub-tasks:"
              jq -r '.[] | "  \(.id). \(.title) (~\(.estimated_turns // "?") turns)"' /tmp/subtasks.json
            else
              echo "Sub-task planning failed or returned no tasks — falling back to monolithic implementation"
              echo '[]' > /tmp/subtasks.json
            fi
          fi

          # Auto-append a final "Write AC tests" sub-task for any AC items not assigned to a step
          if [[ "$AC_COUNT" -gt 0 && -n "${DESIGN_NUMBER}" ]]; then
            jq '[.[] | .ac_items // []] | add // []' /tmp/subtasks.json 2>/dev/null > /tmp/assigned_ac.json || echo '[]' > /tmp/assigned_ac.json
            python3 -c "import json; assigned=set(json.load(open('/tmp/assigned_ac.json'))); ac=json.load(open('/tmp/ac_items.json')); print(json.dumps([i for i in range(1,len(ac)+1) if i not in assigned]))" 2>/dev/null > /tmp/unassigned_ac.json || echo '[]' > /tmp/unassigned_ac.json
            UNASSIGNED_AC=$(cat /tmp/unassigned_ac.json)
            if [[ "$UNASSIGNED_AC" != "[]" ]]; then
              NEXT_ID=$(( $(jq 'length' /tmp/subtasks.json) + 1 ))
              TAGS=$(python3 -c "import json; items=json.load(open('/tmp/unassigned_ac.json')); dn='${DESIGN_NUMBER}'; print(', '.join('[AC-'+dn+'-'+str(i)+']' for i in items))" 2>/dev/null || echo "$UNASSIGNED_AC")
              AC_TASK=$(jq -n \
                --argjson id "$NEXT_ID" \
                --argjson ac_items "$UNASSIGNED_AC" \
                --arg dn "${DESIGN_NUMBER}" \
                --arg tags "$TAGS" \
                '{
                  id: $id,
                  title: "Write AC-tagged tests for remaining acceptance criteria",
                  scope: ("Read the already-committed implementation and write unit tests verifying the remaining acceptance criteria. Tag each test: \($tags). Do NOT add new features — only write tests that exercise existing code."),
                  files_to_create: [],
                  files_to_modify: [],
                  test_file: ("__tests__/ac-" + $dn + ".test.ts"),
                  estimated_turns: 12,
                  ac_items: $ac_items
                }')
              jq --argjson t "$AC_TASK" '. + [$t]' /tmp/subtasks.json > /tmp/subtasks_ac.json
              mv /tmp/subtasks_ac.json /tmp/subtasks.json
              echo "Auto-appended AC sub-task (id $NEXT_ID) for unassigned items: $UNASSIGNED_AC"
            fi
          fi

      - name: Implement sub-tasks
        if: steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          run_claude() {
            bash .github/scripts/run-claude-retry.sh "$1" "$2"
          }

          SUBTASK_COUNT=$(jq length /tmp/subtasks.json)

          if [[ "$SUBTASK_COUNT" -gt 0 ]]; then
            ALL_OK=true
            FAILED_TASK=""

            for ((i=0; i<SUBTASK_COUNT; i++)); do
              TASK=$(jq ".[$i]" /tmp/subtasks.json)
              TASK_ID=$(echo "$TASK" | jq -r '.id')
              TASK_TITLE=$(echo "$TASK" | jq -r '.title')
              TASK_SCOPE=$(echo "$TASK" | jq -r '.scope')
              TASK_TEST=$(echo "$TASK" | jq -r '.test_file')
              TASK_AC_TAGS=$(echo "$TASK" | jq -r --arg dn "${DESIGN_NUMBER:-}" \
                '.ac_items // [] | map("[AC-\($dn)-\(.)]") | join(", ")' 2>/dev/null || true)
              ESTIMATED_TURNS=$(echo "$TASK" | jq -r '.estimated_turns // 20')
              MAX_TURNS=$((ESTIMATED_TURNS + 12))
              FILES_CREATE=$(echo "$TASK" | jq -r '.files_to_create[]?' | head -20)
              FILES_MODIFY=$(echo "$TASK" | jq -r '.files_to_modify[]?' | head -20)

              echo "=== Sub-task ${TASK_ID}/${SUBTASK_COUNT}: ${TASK_TITLE} (max ${MAX_TURNS} turns) ==="

              PREV_LOG=$(git log --oneline origin/main..HEAD 2>/dev/null || true)

              {
                echo "You are implementing sub-task ${TASK_ID} of ${SUBTASK_COUNT} for a larger feature."
                echo "Only implement what is described in 'Sub-task scope' below — nothing more."
                echo ""
                echo "Sub-task title: ${TASK_TITLE}"
                echo "Sub-task scope: ${TASK_SCOPE}"
                echo ""
                if [[ -n "$FILES_CREATE" ]]; then
                  echo "Files to CREATE:"
                  echo "$FILES_CREATE"
                  echo ""
                fi
                if [[ -n "$FILES_MODIFY" ]]; then
                  echo "Files to MODIFY:"
                  echo "$FILES_MODIFY"
                  echo ""
                fi
                echo "Test file to write: ${TASK_TEST}"
                if [[ -n "$TASK_AC_TAGS" ]]; then
                  echo "AC TAGS REQUIRED — tag the it() description of each covering test:"
                  echo "  ${TASK_AC_TAGS}"
                  echo "  Example: it('saves entry [AC-${DESIGN_NUMBER:-0}-1]', () => { ... })"
                fi
                echo ""
                if [[ -n "$PREV_LOG" ]]; then
                  echo "=== Previously committed sub-tasks (already done — do not redo) ==="
                  echo "$PREV_LOG"
                  echo ""
                fi
                echo "=== Full feature context ==="
                cat /tmp/prompt.txt
                echo ""
                echo "RULES:"
                echo "- Implement ONLY the scope described above"
                echo "- Write tests in: ${TASK_TEST}"
                echo "- Do NOT run any git commands"
                echo "- Validate by running: npm run lint && npx tsc --noEmit && npx vitest run ${TASK_TEST}"
                echo "- Do not consider yourself done until all three commands pass"
              } > /tmp/subtask_prompt.txt

              run_claude /tmp/subtask_prompt.txt "$MAX_TURNS"

              TASK_OK=false
              for ATTEMPT in 1 2; do
                LINT_OK=true
                TSC_OK=true
                TEST_OK=true
                npm run lint > /tmp/lint_out.txt 2>&1 || LINT_OK=false
                npx tsc --noEmit > /tmp/tsc_out.txt 2>&1 || TSC_OK=false
                npx vitest run "${TASK_TEST}" > /tmp/test_out.txt 2>&1 || TEST_OK=false

                if [[ "$LINT_OK" == true && "$TSC_OK" == true && "$TEST_OK" == true ]]; then
                  echo "Sub-task ${TASK_ID} CI passed on attempt ${ATTEMPT}"
                  TASK_OK=true
                  break
                fi

                if [[ $ATTEMPT -eq 1 ]]; then
                  GIT_DIFF=$(git diff HEAD 2>/dev/null | head -c 20000)
                  NEW_FILES=$(git ls-files --others --exclude-standard 2>/dev/null)
                  FIX_TURNS=$((ESTIMATED_TURNS > 20 ? ESTIMATED_TURNS : 20))
                  {
                    echo "Sub-task ${TASK_ID}/${SUBTASK_COUNT} (${TASK_TITLE}) CI failed. Fix the failures."
                    echo "Test file: ${TASK_TEST}"
                    echo ""
                    if [[ -n "$NEW_FILES" ]]; then
                      echo "=== New files created ==="
                      echo "$NEW_FILES"
                      echo "(Use Read on any of these for full content)"
                      echo ""
                    fi
                    if [[ -n "$GIT_DIFF" ]]; then
                      echo "=== Changes to existing files ==="
                      echo "$GIT_DIFF"
                      echo ""
                    fi
                    echo "=== CI failures ==="
                    if [[ "$LINT_OK" != true ]]; then
                      echo "-- lint --"
                      tail -50 /tmp/lint_out.txt
                    fi
                    if [[ "$TSC_OK" != true ]]; then
                      echo "-- tsc --"
                      tail -50 /tmp/tsc_out.txt
                    fi
                    if [[ "$TEST_OK" != true ]]; then
                      echo "-- vitest --"
                      tail -100 /tmp/test_out.txt
                    fi
                    echo ""
                    echo "Fix the failures. Validate: npm run lint && npx tsc --noEmit && npx vitest run ${TASK_TEST}"
                  } > /tmp/fix_prompt.txt
                  run_claude /tmp/fix_prompt.txt "$FIX_TURNS"
                fi
              done

              git add -A
              if ! git diff --cached --quiet; then
                git commit -m "feat: ${TASK_TITLE} [${TASK_ID}/${SUBTASK_COUNT}]"
              fi

              if [[ "$TASK_OK" == true && -n "${DESIGN_NUMBER}" ]]; then
                gh issue view "${DESIGN_NUMBER}" --json body --jq '.body' > /tmp/design_current_body.txt
                python3 -c "b=open('/tmp/design_current_body.txt').read(); open('/tmp/design_ticked_body.txt','w').write(b.replace('- [ ] **Step ${TASK_ID}:', '- [x] **Step ${TASK_ID}:', 1))"
                gh issue edit "${DESIGN_NUMBER}" --body-file /tmp/design_ticked_body.txt || true
              fi

              if [[ "$TASK_OK" != true ]]; then
                echo "Sub-task ${TASK_ID} failed after retry — stopping"
                ALL_OK=false
                FAILED_TASK="sub-task ${TASK_ID}: ${TASK_TITLE}"
                break
              fi
            done

            if [[ "$ALL_OK" != true ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Implementation stopped at ${FAILED_TASK} after 2 attempts. A partial PR will be opened with completed work for review."
              echo "IMPL_FAILED=true" >> "$GITHUB_ENV"
            else
              echo "=== Final coverage gate ==="
              if ! npm run test:coverage > /tmp/coverage_out.txt 2>&1; then
                tail -50 /tmp/coverage_out.txt
                gh issue comment "${ISSUE_NUMBER}" \
                  --body "All sub-tasks passed targeted tests but the full coverage gate failed. A PR will be opened for manual review."
              fi
            fi

          else
            CI_PASS=false
            for ATTEMPT in 1 2 3; do
              echo "=== Implementation attempt ${ATTEMPT}/3 ==="

              if [[ $ATTEMPT -eq 1 ]]; then
                PROMPT_FILE=/tmp/prompt.txt
                MAX_TURNS=30
              else
                GIT_DIFF=$(git diff HEAD 2>/dev/null | head -c 20000)
                NEW_FILES=$(git ls-files --others --exclude-standard 2>/dev/null)
                {
                  echo "You previously implemented a feature but the CI checks failed."
                  echo "Use the context below — do not re-read the whole codebase."
                  echo ""
                  if [[ -n "$NEW_FILES" ]]; then
                    echo "=== New files created ==="
                    echo "$NEW_FILES"
                    echo "(Use Read on any of these for full content)"
                    echo ""
                  fi
                  if [[ -n "$GIT_DIFF" ]]; then
                    echo "=== Changes to existing files ==="
                    echo "$GIT_DIFF"
                    echo ""
                  fi
                  echo "=== CI failures to fix ==="
                  cat /tmp/ci_failures.txt
                  echo ""
                  echo "Fix the failures. Validate: npm run lint && npx tsc --noEmit && npm run test:coverage"
                  echo "Do not consider yourself done until all three pass."
                } > /tmp/fix_prompt.txt
                PROMPT_FILE=/tmp/fix_prompt.txt
                MAX_TURNS=20
              fi

              run_claude "$PROMPT_FILE" "$MAX_TURNS"

              if [[ $ATTEMPT -eq 1 ]]; then
                TEST_CHANGES=$({ git diff --name-only; git ls-files --others --exclude-standard; } \
                  | grep -E '__tests__/|\.test\.(ts|tsx)' || true)
                if [[ -z "$TEST_CHANGES" ]]; then
                  printf 'No test files were written. Every new behaviour must have tests in __tests__/.\n' \
                    > /tmp/ci_failures.txt
                  continue
                fi
              fi

              LINT_OK=true
              TSC_OK=true
              TEST_OK=true
              npm run lint > /tmp/lint_out.txt 2>&1 || LINT_OK=false
              npx tsc --noEmit > /tmp/tsc_out.txt 2>&1 || TSC_OK=false
              npm run test:coverage > /tmp/test_out.txt 2>&1 || TEST_OK=false

              if [[ "$LINT_OK" == true && "$TSC_OK" == true && "$TEST_OK" == true ]]; then
                echo "All CI checks passed on attempt ${ATTEMPT}/3"
                CI_PASS=true
                break
              fi

              : > /tmp/ci_failures.txt
              if [[ "$LINT_OK" != true ]]; then
                { echo "=== lint failures ==="; tail -50 /tmp/lint_out.txt; echo ""; } >> /tmp/ci_failures.txt
              fi
              if [[ "$TSC_OK" != true ]]; then
                { echo "=== tsc failures ==="; tail -50 /tmp/tsc_out.txt; echo ""; } >> /tmp/ci_failures.txt
              fi
              if [[ "$TEST_OK" != true ]]; then
                { echo "=== test:coverage failures ==="; tail -100 /tmp/test_out.txt; echo ""; } >> /tmp/ci_failures.txt
              fi
              echo "Attempt ${ATTEMPT}/3 failed — failures:"
              cat /tmp/ci_failures.txt
            done

            if [[ "$CI_PASS" != true ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Claude made 3 implementation attempts but CI still fails. Manual intervention required. Re-add \`status: auto-implement\` to retry."
              exit 1
            fi
          fi

      - name: Verify acceptance criteria
        if: steps.pr_check.outputs.skip != 'true' && env.IMPL_FAILED != 'true'
        uses: ./.github/actions/verify-ac
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open PR
        if: steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          COMMITS_AHEAD=$(git rev-list origin/main..HEAD --count 2>/dev/null || echo 0)
          UNCOMMITTED=$({ git diff --name-only; git ls-files --others --exclude-standard; } || true)

          if [[ "$COMMITS_AHEAD" -eq 0 && -z "$UNCOMMITTED" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Claude Code ran but made no changes. The feature may already be implemented or the request needs more detail."
            exit 0
          fi

          FEATURE_TITLE=$(printf '%s' "${ISSUE_TITLE}" | sed 's/^\[Feature Request\] //')
          TIMESTAMP=$(date +%s)
          BRANCH="feat/issue-${ISSUE_NUMBER}-${TIMESTAMP}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [[ -n "$UNCOMMITTED" ]]; then
            git add -A
            git commit -m "feat: ${FEATURE_TITLE} (closes #${ISSUE_NUMBER})"
          fi

          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$BRANCH"

          HUMAN_STEPS=$(python3 -c "import re; b=open('/tmp/design_body.txt').read(); m=re.search(r'## Human verification steps\n(.*?)(?=\n## |\Z)', b, re.DOTALL); t=m.group(1).strip() if m else ''; print('' if t in ('', 'None.', 'None') else t)" 2>/dev/null || true)

          {
            echo "Closes #${ISSUE_NUMBER}"
            if [[ -n "${DESIGN_NUMBER}" ]]; then
              echo "Closes #${DESIGN_NUMBER}"
            fi
            echo ""
            echo "Implemented by Claude Code based on approved design #${DESIGN_NUMBER:-N/A}."
            if [[ -s /tmp/summary.txt ]]; then
              echo ""
              cat /tmp/summary.txt
            fi
            if [[ -n "$HUMAN_STEPS" ]]; then
              echo ""
              echo "## Human verification steps"
              echo "Before merging, please verify these manually:"
              echo ""
              echo "$HUMAN_STEPS"
            fi
            if [[ "${AC_PASS}" == "false" ]]; then
              echo ""
              echo "⚠️ **Acceptance criteria**: 2 self-heal attempts did not resolve all Playwright test failures. Run through the acceptance criteria in #${DESIGN_NUMBER} manually before merging."
            fi
          } > /tmp/pr_body.txt

          PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
            --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file /tmp/pr_body.txt \
            --base main)
          GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual merge required" || true
          if [[ "${AC_PASS}" == "false" ]]; then
            gh label create "needs-acceptance-testing" --color "E4E669" --force 2>/dev/null || true
            GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "needs-acceptance-testing" || true
          fi

          {
            if [[ -s /tmp/summary.txt ]]; then
              cat /tmp/summary.txt
              echo ""
            fi
            echo "Implementation ready for review: ${PR_URL}"
            if [[ "${AC_PASS}" == "false" ]]; then
              echo ""
              echo "⚠️ Acceptance criteria verification failed after 2 self-heal attempts. Check the PR for details and verify manually before merging."
            fi
          } > /tmp/issue_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt

      - name: Fail if implementation incomplete
        if: always()
        run: |
          if [[ "${IMPL_FAILED}" == "true" ]]; then
            echo "Sub-task implementation did not complete — marking workflow as failed"
            exit 1
          fi
