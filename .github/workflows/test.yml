name: Unit tests

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ format('{0}-unit-test', github.event_name == 'pull_request' && github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: zhaoanliu/claude-dev-automation/actions/detect-doc-only@v1.0.0
        id: detect

  unit-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Export test results as JSON
        if: github.event_name == 'pull_request'
        run: npx vitest run --reporter=json --outputFile=test-results.json

      - name: Check AC coverage
        id: ac_check
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/check-ac-coverage.mjs

      - uses: zhaoanliu/claude-dev-automation/actions/trigger-ci-failure@v1.0.0
        if: failure() && github.event_name != 'repository_dispatch'
        with:
          gh-pat: ${{ secrets.GH_PAT }}
