name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  unit-test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  e2e-auth:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  migrate-validate:
    uses: ./.github/workflows/migrate-validate.yml
    secrets: inherit

  deploy:
    needs: [lint, unit-test, e2e-auth, migrate-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2.1.1
        with:
          version: 2.102.0

      - name: Apply migrations
        id: apply-migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co.*||')
          supabase link --project-ref "$PROJECT_REF" --password ""
          supabase db push

      - name: Deploy to Vercel
        id: deploy-vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_aTYh0oWfaRSgem4RzW5JH9c0
          VERCEL_PROJECT_ID: prj_5J32UqKRiToXBAzDPFPym5EfnXI2
        run: |
          set -o pipefail
          npx vercel deploy --prod --token="${VERCEL_TOKEN}" 2>&1 | tee /tmp/vercel_output.txt

      - name: Close open CD failure issues on successful deploy
        if: steps.deploy-vercel.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          OPEN_ISSUES=$(gh issue list \
            --state open \
            --limit 50 \
            --json number,title \
            | jq -r '.[] | select(.title | startswith("CD failure:")) | .number')
          if [[ -n "$OPEN_ISSUES" ]]; then
            while IFS= read -r NUM; do
              gh issue comment "$NUM" \
                --body "Production deployment of \`${SHORT_SHA}\` succeeded. Auto-closing."
              gh issue close "$NUM"
            done <<< "$OPEN_ISSUES"
          fi

      - name: Trigger db-fix on migration failure
        if: failure() && steps.apply-migrations.outcome == 'failure' && github.event_name != 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          jq -n \
            --arg id "${{ github.run_id }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"event_type":"db-failure","client_payload":{"run_id":$id,"run_url":$url}}' \
          | gh api repos/${{ github.repository }}/dispatches --method POST --input -

      - name: Trigger cd-auto-fix on non-migration deploy failure
        if: failure() && steps.apply-migrations.outcome != 'failure' && github.event_name != 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERCEL_ERR=$(tail -30 /tmp/vercel_output.txt 2>/dev/null | head -c 800 || true)
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg err "$VERCEL_ERR" \
            '{"event_type":"cd-failure","client_payload":{"sha":$sha,"deployment_url":$url,"vercel_error":$err}}' \
          | gh api repos/${{ github.repository }}/dispatches --method POST --input -
