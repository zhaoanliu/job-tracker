name: Auto-fix Sentry issues

on:
  issues:
    types: [opened, reopened]

jobs:
  auto-fix:
    # Only run for issues created by the Sentry GitHub integration
    if: contains(github.event.issue.body, 'sentry.io')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "
          A bug was caught by Sentry and reported as GitHub issue #${{ github.event.issue.number }}.

          Title: ${{ github.event.issue.title }}

          Details:
          ${{ github.event.issue.body }}

          Analyze the error, find the root cause in the codebase, and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT add comments explaining what you changed.
          "

      - name: Open PR if changes were made
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z $(git diff --name-only) ]]; then
            echo "No changes made, skipping PR"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-fix for issue #${{ github.event.issue.number }}"
          git push origin "${{ steps.branch.outputs.name }}"

          PR_URL=$(gh pr create \
            --title "fix: ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --base main)

          gh issue comment ${{ github.event.issue.number }} \
            --body "A fix has been proposed: $PR_URL — please review before merging."
