name: Auto-fix Sentry issues

on:
  issues:
    types: [opened, reopened]

jobs:
  auto-fix:
    if: github.event_name == 'issues' && contains(github.event.issue.body, 'sentry.io')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: |
          npm config set prefix ~/.npm-global
          export PATH=~/.npm-global/bin:$PATH
          npm install -g @anthropic-ai/claude-code
          echo "~/.npm-global/bin" >> $GITHUB_PATH

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Write prompt file
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          A bug was caught by Sentry and reported as a GitHub issue.
          EOF
          echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Details:" >> /tmp/prompt.txt
          printf '%s\n' "${ISSUE_BODY}" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          cat >> /tmp/prompt.txt << 'EOF'
          Analyze the error, find the root cause in the codebase, and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT add comments explaining what you changed.
          EOF

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"

      - name: Open PR if changes were made
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if [[ -z $(git diff --name-only) ]]; then
            echo "No changes made, skipping PR"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}"
          git push origin "${{ steps.branch.outputs.name }}"

          PR_URL=$(gh pr create \
            --title "fix: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base main)

          gh issue comment "${ISSUE_NUMBER}" \
            --body "A fix has been proposed: $PR_URL — please review before merging."
