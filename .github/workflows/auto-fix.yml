name: Auto-fix Sentry issues

on:
  issues:
    types: [opened, reopened, closed]
  repository_dispatch:
    types: [sentry-issue]

jobs:
  resolve-sentry-on-close:
    if: github.event_name == 'issues' && github.event.action == 'closed' && contains(github.event.issue.body, 'sentry.io')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Sentry issue
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SENTRY_ID=$(printf '%s' "${ISSUE_BODY}" | grep -oE '[0-9]{7,}' | head -1)
          if [[ -n "${SENTRY_ID}" && -n "${SENTRY_AUTH_TOKEN}" ]]; then
            RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT "https://sentry.io/api/0/issues/${SENTRY_ID}/" \
              -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"status":"resolved"}')
            echo "Sentry resolve HTTP ${RESULT} for issue ${SENTRY_ID}"
          fi

  auto-fix:
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'issues' && github.event.action != 'closed' && contains(github.event.issue.body, 'sentry.io') && !contains(github.event.issue.labels.*.name, 'user-requested'))
    runs-on: ubuntu-latest
    concurrency:
      group: auto-fix
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: |
          npm config set prefix ~/.npm-global
          export PATH=~/.npm-global/bin:$PATH
          npm install -g @anthropic-ai/claude-code
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Find or create GitHub issue
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_URL: ${{ github.event.client_payload.sentry_url }}
          SENTRY_TITLE: ${{ github.event.client_payload.title }}
          SENTRY_CULPRIT: ${{ github.event.client_payload.culprit }}
          ISSUES_NUMBER: ${{ github.event.issue.number }}
          ISSUES_TITLE: ${{ github.event.issue.title }}
          ISSUES_BODY: ${{ github.event.issue.body }}
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "number=${ISSUES_NUMBER}" >> "$GITHUB_OUTPUT"
            SENTRY_ID=$(printf '%s' "${ISSUES_BODY}" | grep -oE '[0-9]{7,}' | head -1)
            echo "sentry_id=${SENTRY_ID}" >> "$GITHUB_OUTPUT"
            printf '%s' "${ISSUES_TITLE}" > /tmp/issue_title.txt
            printf '%s' "${ISSUES_BODY}" > /tmp/issue_body.txt
          else
            # Extract numeric ID from Sentry URL — works for both
            # https://sentry.io/api/0/.../issues/1234/ and
            # https://org.sentry.io/issues/1234/
            SENTRY_ID=$(echo "${SENTRY_URL}" | grep -oE '[0-9]{7,}')
            echo "sentry_id=${SENTRY_ID}" >> "$GITHUB_OUTPUT"
            # Use list API (not search) to avoid search-index lag on freshly-created issues.
            # Only search open issues: sentry[bot] always creates a new open issue per alert,
            # so there is no need to find and reopen an old closed one.
            EXISTING=$(gh issue list \
              --state open \
              --limit 50 \
              --json number,title | \
              jq --arg title "${SENTRY_TITLE}" \
                '[.[] | select(.title == $title)] | .[0] // empty')

            if [[ -n "$EXISTING" ]]; then
              NUMBER=$(echo "$EXISTING" | jq -r '.number')
              echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
            else
              # A concurrent run may have already fixed this and closed a matching issue.
              # Only search open issues to avoid reopening old closed ones, but check closed
              # issues here to detect when the fix landed while we were queued.
              RECENT_CLOSED=$(gh issue list \
                --state closed \
                --limit 20 \
                --json number,title | \
                jq --arg title "${SENTRY_TITLE}" \
                  '[.[] | select(.title == $title)] | .[0] // empty')
              if [[ -n "$RECENT_CLOSED" ]]; then
                CLOSED_NUMBER=$(echo "$RECENT_CLOSED" | jq -r '.number')
                echo "Concurrent run already fixed this (closed issue #${CLOSED_NUMBER}). Skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"
              else
                ISSUE_URL=$(gh issue create \
                  --title "${SENTRY_TITLE}" \
                  --body "**Sentry issue:** ${SENTRY_URL}"$'\n\n'"**Culprit:** ${SENTRY_CULPRIT}"$'\n\n'"This issue was automatically created from a Sentry alert.")
                NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
                echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
              fi
            fi

            printf '%s' "${SENTRY_TITLE}" > /tmp/issue_title.txt
            printf 'Sentry issue: %s\nCulprit: %s' "${SENTRY_URL}" "${SENTRY_CULPRIT}" > /tmp/issue_body.txt
          fi

      - name: Fetch Sentry details
        if: steps.issue.outputs.skip != 'true'
        id: sentry_details
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ID: ${{ steps.issue.outputs.sentry_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          if [[ -z "${SENTRY_ID}" || -z "${SENTRY_AUTH_TOKEN}" ]]; then
            printf '' > /tmp/sentry_details.txt
            exit 0
          fi

          ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/issues/${SENTRY_ID}/" || echo '{}')

          # replay_hydration_error (type 5003) has no stack trace and is never fixable
          # in application code — typically caused by browser extensions.
          ISSUE_TYPE=$(printf '%s' "$ISSUE_JSON" | jq -r '.issueType // ""')
          if [[ "$ISSUE_TYPE" == "replay_hydration_error" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Skipping auto-fix: Sentry issued this as \`replay_hydration_error\` — no stack trace is available. These are typically caused by browser extensions modifying the DOM and are not fixable in application code."
            gh issue close "${ISSUE_NUMBER}"
            exit 0
          fi

          EVENT_JSON=$(curl -sf \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/issues/${SENTRY_ID}/events/latest/" || echo '{}')

          CULPRIT=$(printf '%s' "$ISSUE_JSON" | jq -r '.culprit // ""')
          ERROR_TYPE=$(printf '%s' "$EVENT_JSON" | \
            jq -r '.entries[]? | select(.type=="exception") | .data.values[-1]?.type // ""' | head -1)
          ERROR_VALUE=$(printf '%s' "$EVENT_JSON" | \
            jq -r '.entries[]? | select(.type=="exception") | .data.values[-1]?.value // ""' | head -1)

          FRAMES=$(printf '%s' "$EVENT_JSON" | jq -r '
            [
              .entries[]? |
              select(.type=="exception") |
              .data.values[-1]?.stacktrace.frames? // [] |
              .[]
            ] | .[-8:] | .[] |
            "\(if .inApp == true then "[app] " else "      " end)\(.filename // "unknown"):\(.lineNo // "?") in \(.function // "<anonymous>")"
          ' 2>/dev/null)

          {
            [[ -n "$ERROR_TYPE" ]] && printf 'Error type: %s\n' "$ERROR_TYPE"
            [[ -n "$ERROR_VALUE" ]] && printf 'Error message: %s\n' "$ERROR_VALUE"
            [[ -n "$CULPRIT" ]] && printf 'Culprit: %s\n' "$CULPRIT"
            if [[ -n "$FRAMES" ]]; then
              printf '\nStack trace (most recent frames, [app] = your code):\n%s\n' "$FRAMES"
            fi
          } > /tmp/sentry_details.txt

          cat /tmp/sentry_details.txt

      - name: Write prompt file
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          A bug was caught by Sentry and reported as a GitHub issue.
          EOF
          {
            echo "Issue #${ISSUE_NUMBER}: $(cat /tmp/issue_title.txt)"
            echo ""
            echo "Details:"
            cat /tmp/issue_body.txt
            echo ""
            if [[ -s /tmp/sentry_details.txt ]]; then
              echo "Sentry event details:"
              cat /tmp/sentry_details.txt
              echo ""
            fi
          } >> /tmp/prompt.txt
          cat >> /tmp/prompt.txt << 'EOF'
          Analyze the error, find the root cause in the codebase, and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT modify any files under .github/ — workflow changes are out of scope.
          Do NOT add comments explaining what you changed.

          After making the fix, write a single word to /tmp/risk.txt:
          - Write "low" if ALL of the following are true:
            - 1 or 2 files changed
            - The fix is a null guard, type safety fix, or simple value correction
            - No new functions, classes, or logic flows were added
            - No auth, database schema, or API surface was touched
          - Write "high" for anything else, when in doubt use "high"

          Write ONLY the word "low" or "high" to /tmp/risk.txt, nothing else.
          EOF

      - name: Run Claude Code
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --max-turns 20 -p "$(cat /tmp/prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then
              break
            fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              echo "claude exited with code $CLAUDE_EXIT (attempt $attempt/3), continuing"
              break
            fi
          done

      - name: Revert .github/ changes
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        run: |
          git fetch origin main
          git checkout origin/main -- .github/ 2>/dev/null || true

      - name: Merge or open PR
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          SENTRY_ID: ${{ steps.issue.outputs.sentry_id }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_aTYh0oWfaRSgem4RzW5JH9c0
          VERCEL_PROJECT_ID: prj_5J32UqKRiToXBAzDPFPym5EfnXI2
        run: |
          if [[ -z $(git diff --name-only) ]]; then
            echo "No changes made, skipping"
            exit 0
          fi

          ISSUE_TITLE=$(cat /tmp/issue_title.txt)
          RISK=$(cat /tmp/risk.txt 2>/dev/null | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          RISK=${RISK:-high}
          FILES_CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          STATS=$(git diff --shortstat)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL_LINES=$(( ${INSERTIONS:-0} + ${DELETIONS:-0} ))

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "$RISK" == "low" && "$FILES_CHANGED" -le 2 && "$TOTAL_LINES" -le 20 ]]; then
            git add -A
            git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Auto-fix skipped: a concurrent run already pushed a fix for this error, causing a rebase conflict. The fix is already in main — closing as a duplicate."
              gh issue close "${ISSUE_NUMBER}"
              exit 0
            fi
            COMMITS_AHEAD=$(git rev-list origin/main..HEAD --count)
            if [[ "$COMMITS_AHEAD" -gt 0 ]]; then
              git push origin HEAD:main
              npx vercel deploy --prod --token="${VERCEL_TOKEN}" || true
            else
              echo "Fix already in main (another run applied it first), skipping push"
            fi

            gh issue comment "${ISSUE_NUMBER}" \
              --body "Fix applied automatically (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed). Closes #${ISSUE_NUMBER}"
            gh issue close "${ISSUE_NUMBER}"

            if [[ -n "${SENTRY_ID}" && -n "${SENTRY_AUTH_TOKEN}" ]]; then
              RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "https://sentry.io/api/0/issues/${SENTRY_ID}/" \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"status":"resolved"}')
              echo "Sentry resolve HTTP ${RESULT} for issue ${SENTRY_ID}"
            fi
          else
            BRANCH="fix/issue-${ISSUE_NUMBER}-$(date +%s)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "fix: ${ISSUE_TITLE}" \
              --body "Closes #${ISSUE_NUMBER}"$'\n\n'"**Risk assessment:** \`${RISK}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed)" \
              --base main)

            gh issue comment "${ISSUE_NUMBER}" \
              --body "A fix has been proposed: $PR_URL — please review before merging."
          fi
