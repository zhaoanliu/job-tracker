name: Auto-fix Sentry issues

on:
  issues:
    types: [opened, reopened]
  repository_dispatch:
    types: [sentry-issue]

jobs:
  auto-fix:
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'issues' && contains(github.event.issue.body, 'sentry.io'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: |
          npm config set prefix ~/.npm-global
          export PATH=~/.npm-global/bin:$PATH
          npm install -g @anthropic-ai/claude-code
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Find or create GitHub issue
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_URL: ${{ github.event.client_payload.sentry_url }}
          SENTRY_TITLE: ${{ github.event.client_payload.title }}
          SENTRY_CULPRIT: ${{ github.event.client_payload.culprit }}
          ISSUES_NUMBER: ${{ github.event.issue.number }}
          ISSUES_TITLE: ${{ github.event.issue.title }}
          ISSUES_BODY: ${{ github.event.issue.body }}
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "number=${ISSUES_NUMBER}" >> "$GITHUB_OUTPUT"
            printf '%s' "${ISSUES_TITLE}" > /tmp/issue_title.txt
            printf '%s' "${ISSUES_BODY}" > /tmp/issue_body.txt
          else
            EXISTING=$(gh issue list \
              --search "${SENTRY_URL}" \
              --state all \
              --json number,state \
              --jq '.[0] // empty')

            if [[ -n "$EXISTING" ]]; then
              NUMBER=$(echo "$EXISTING" | jq -r '.number')
              STATE=$(echo "$EXISTING" | jq -r '.state' | tr '[:upper:]' '[:lower:]')
              if [[ "$STATE" == "closed" ]]; then
                gh issue reopen "$NUMBER"
              fi
              echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
            else
              ISSUE_URL=$(gh issue create \
                --title "${SENTRY_TITLE}" \
                --body "**Sentry issue:** ${SENTRY_URL}"$'\n\n'"**Culprit:** ${SENTRY_CULPRIT}"$'\n\n'"This issue was automatically created from a Sentry alert.")
              NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
            fi

            printf '%s' "${SENTRY_TITLE}" > /tmp/issue_title.txt
            printf 'Sentry issue: %s\nCulprit: %s' "${SENTRY_URL}" "${SENTRY_CULPRIT}" > /tmp/issue_body.txt
          fi

      - name: Write prompt file
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          A bug was caught by Sentry and reported as a GitHub issue.
          EOF
          {
            echo "Issue #${ISSUE_NUMBER}: $(cat /tmp/issue_title.txt)"
            echo ""
            echo "Details:"
            cat /tmp/issue_body.txt
            echo ""
          } >> /tmp/prompt.txt
          cat >> /tmp/prompt.txt << 'EOF'
          Analyze the error, find the root cause in the codebase, and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT add comments explaining what you changed.

          After making the fix, write a single word to /tmp/risk.txt:
          - Write "low" if ALL of the following are true:
            - 1 or 2 files changed
            - The fix is a null guard, type safety fix, or simple value correction
            - No new functions, classes, or logic flows were added
            - No auth, database schema, or API surface was touched
          - Write "high" for anything else, when in doubt use "high"

          Write ONLY the word "low" or "high" to /tmp/risk.txt, nothing else.
          EOF

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --dangerously-skip-permissions --max-turns 20 -p "$(cat /tmp/prompt.txt)" || echo "claude exited with code $? (max-turns or error), continuing"

      - name: Merge or open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          if [[ -z $(git diff --name-only) ]]; then
            echo "No changes made, skipping"
            exit 0
          fi

          ISSUE_TITLE=$(cat /tmp/issue_title.txt)
          RISK=$(cat /tmp/risk.txt 2>/dev/null | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          RISK=${RISK:-high}
          FILES_CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          STATS=$(git diff --shortstat)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL_LINES=$(( ${INSERTIONS:-0} + ${DELETIONS:-0} ))

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "$RISK" == "low" && "$FILES_CHANGED" -le 2 && "$TOTAL_LINES" -le 20 ]]; then
            git add -A
            git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}"
            git push origin HEAD:main

            gh issue comment "${ISSUE_NUMBER}" \
              --body "Fix applied automatically (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed). Closes #${ISSUE_NUMBER}"
            gh issue close "${ISSUE_NUMBER}"
          else
            BRANCH="fix/issue-${ISSUE_NUMBER}"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "fix: ${ISSUE_TITLE}" \
              --body "Closes #${ISSUE_NUMBER}"$'\n\n'"**Risk assessment:** \`${RISK}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed)" \
              --base main)

            gh issue comment "${ISSUE_NUMBER}" \
              --body "A fix has been proposed: $PR_URL — please review before merging."
          fi
