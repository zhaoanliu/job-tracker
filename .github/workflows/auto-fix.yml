name: Auto-fix bugs

on:
  issues:
    types: [opened, reopened, closed]
  repository_dispatch:
    types: [sentry-issue]

jobs:
  clear-in-progress-on-close:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove status:in-progress label
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" --repo "${{ github.repository }}" --remove-label "status: in progress" || true

  resolve-sentry-on-close:
    if: github.event_name == 'issues' && github.event.action == 'closed' && contains(github.event.issue.body, 'sentry.io')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Sentry issue
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SENTRY_ID=$(printf '%s' "${ISSUE_BODY}" | grep -oE '[0-9]{7,}' | head -1)
          if [[ -n "${SENTRY_ID}" && -n "${SENTRY_AUTH_TOKEN}" ]]; then
            RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT "https://sentry.io/api/0/issues/${SENTRY_ID}/" \
              -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"status":"resolved"}')
            echo "Sentry resolve HTTP ${RESULT} for issue ${SENTRY_ID}"
          fi

  auto-fix:
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened') && contains(github.event.issue.body, 'sentry.io'))
    runs-on: ubuntu-latest
    concurrency:
      group: auto-fix
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-claude

      - name: Find or create GitHub issue
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_URL: ${{ github.event.client_payload.sentry_url }}
          SENTRY_TITLE: ${{ github.event.client_payload.title }}
          SENTRY_CULPRIT: ${{ github.event.client_payload.culprit }}
          ISSUES_NUMBER: ${{ github.event.issue.number }}
          ISSUES_TITLE: ${{ github.event.issue.title }}
          ISSUES_BODY: ${{ github.event.issue.body }}
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "number=${ISSUES_NUMBER}" >> "$GITHUB_OUTPUT"
            SENTRY_ID=$(printf '%s' "${ISSUES_BODY}" | grep -oE '[0-9]{7,}' | head -1)
            echo "sentry_id=${SENTRY_ID}" >> "$GITHUB_OUTPUT"
            printf '%s' "${ISSUES_TITLE}" > /tmp/issue_title.txt
            printf '%s' "${ISSUES_BODY}" > /tmp/issue_body.txt
          else
            # Extract numeric ID from Sentry URL — works for both
            # https://sentry.io/api/0/.../issues/1234/ and
            # https://org.sentry.io/issues/1234/
            SENTRY_ID=$(echo "${SENTRY_URL}" | grep -oE '[0-9]{7,}')
            echo "sentry_id=${SENTRY_ID}" >> "$GITHUB_OUTPUT"
            # Use list API (not search) to avoid search-index lag on freshly-created issues.
            # Only search open issues: sentry[bot] always creates a new open issue per alert,
            # so there is no need to find and reopen an old closed one.
            EXISTING=$(gh issue list \
              --state open \
              --limit 50 \
              --json number,title | \
              jq --arg title "${SENTRY_TITLE}" \
                '[.[] | select(.title == $title)] | .[0] // empty')

            if [[ -n "$EXISTING" ]]; then
              NUMBER=$(echo "$EXISTING" | jq -r '.number')
              echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
              # A concurrent run may have already opened a PR for this issue.
              # Branch names are fix/issue-N-<timestamp>, so match by prefix.
              EXISTING_PR=$(gh pr list \
                --state open \
                --json number,headRefName | \
                jq --arg prefix "fix/issue-${NUMBER}-" \
                  '[.[] | select(.headRefName | startswith($prefix))] | .[0] // empty')
              if [[ -n "$EXISTING_PR" ]]; then
                PR_NUM=$(echo "$EXISTING_PR" | jq -r '.number')
                echo "PR #${PR_NUM} already open for issue #${NUMBER}. Skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            else
              # A concurrent run may have already fixed this and closed a matching issue.
              # Only search open issues to avoid reopening old closed ones, but check closed
              # issues here to detect when the fix landed while we were queued.
              RECENT_CLOSED=$(gh issue list \
                --state closed \
                --limit 20 \
                --json number,title | \
                jq --arg title "${SENTRY_TITLE}" \
                  '[.[] | select(.title == $title)] | .[0] // empty')
              if [[ -n "$RECENT_CLOSED" ]]; then
                CLOSED_NUMBER=$(echo "$RECENT_CLOSED" | jq -r '.number')
                echo "Concurrent run already fixed this (closed issue #${CLOSED_NUMBER}). Skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"
              else
                ISSUE_URL=$(gh issue create \
                  --title "${SENTRY_TITLE}" \
                  --body "**Sentry issue:** ${SENTRY_URL}"$'\n\n'"**Culprit:** ${SENTRY_CULPRIT}"$'\n\n'"This issue was automatically created from a Sentry alert.")
                NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
                echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
              fi
            fi

            printf '%s' "${SENTRY_TITLE}" > /tmp/issue_title.txt
            printf 'Sentry issue: %s\nCulprit: %s' "${SENTRY_URL}" "${SENTRY_CULPRIT}" > /tmp/issue_body.txt
          fi

      - name: Fetch Sentry details
        if: steps.issue.outputs.skip != 'true'
        id: sentry_details
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ID: ${{ steps.issue.outputs.sentry_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          if [[ -z "${SENTRY_ID}" || -z "${SENTRY_AUTH_TOKEN}" ]]; then
            printf '' > /tmp/sentry_details.txt
            exit 0
          fi

          ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/issues/${SENTRY_ID}/" || echo '{}')

          # replay_hydration_error (type 5003) has no stack trace and is never fixable
          # in application code — typically caused by browser extensions.
          ISSUE_TYPE=$(printf '%s' "$ISSUE_JSON" | jq -r '.issueType // ""')
          if [[ "$ISSUE_TYPE" == "replay_hydration_error" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            gh issue comment "${ISSUE_NUMBER}" \
              --body "Skipping auto-fix: Sentry issued this as \`replay_hydration_error\` — no stack trace is available. These are typically caused by browser extensions modifying the DOM and are not fixable in application code."
            GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" --remove-label "status: in progress" || true
            GH_TOKEN="${GH_PAT}" gh issue close "${ISSUE_NUMBER}"
            exit 0
          fi

          EVENT_JSON=$(curl -sf \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/issues/${SENTRY_ID}/events/latest/" || echo '{}')

          CULPRIT=$(printf '%s' "$ISSUE_JSON" | jq -r '.culprit // ""')
          ERROR_TYPE=$(printf '%s' "$EVENT_JSON" | \
            jq -r '.entries[]? | select(.type=="exception") | .data.values[-1]?.type // ""' | head -1)
          ERROR_VALUE=$(printf '%s' "$EVENT_JSON" | \
            jq -r '.entries[]? | select(.type=="exception") | .data.values[-1]?.value // ""' | head -1)

          FRAMES=$(printf '%s' "$EVENT_JSON" | jq -r '
            [
              .entries[]? |
              select(.type=="exception") |
              .data.values[-1]?.stacktrace.frames? // [] |
              .[]
            ] | .[-8:] | .[] |
            "\(if .inApp == true then "[app] " else "      " end)\(.filename // "unknown"):\(.lineNo // "?") in \(.function // "<anonymous>")"
          ' 2>/dev/null)

          {
            [[ -n "$ERROR_TYPE" ]] && printf 'Error type: %s\n' "$ERROR_TYPE"
            [[ -n "$ERROR_VALUE" ]] && printf 'Error message: %s\n' "$ERROR_VALUE"
            [[ -n "$CULPRIT" ]] && printf 'Culprit: %s\n' "$CULPRIT"
            if [[ -n "$FRAMES" ]]; then
              printf '\nStack trace (most recent frames, [app] = your code):\n%s\n' "$FRAMES"
            fi
          } > /tmp/sentry_details.txt

          cat /tmp/sentry_details.txt

      - name: Write prompt file
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          A bug has been reported as a GitHub issue.
          EOF
          {
            echo "Issue #${ISSUE_NUMBER}: $(cat /tmp/issue_title.txt)"
            echo ""
            echo "Details:"
            cat /tmp/issue_body.txt
            echo ""
            if [[ -s /tmp/sentry_details.txt ]]; then
              echo "Sentry event details:"
              cat /tmp/sentry_details.txt
              echo ""
            fi
          } >> /tmp/prompt.txt
          cat >> /tmp/prompt.txt << 'EOF'
          Analyze the error, find the root cause in the codebase, and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT modify any files under .github/ — workflow changes are out of scope.
          Do NOT add code comments explaining what you changed.
          Do NOT remove env-var guards such as `if (!process.env.X) { notFound() }` or `if (!process.env.X) { redirect(...) }` — these are intentional failure modes for missing configuration, not dead code. If such a guard is triggering, the fix is to ensure the env var is set, not to remove the guard.

          After making the fix, write two output files:

          1. /tmp/summary.txt — a markdown summary with exactly these sections:
          ## Problem
          One or two sentences: what the error was and how it manifested.
          ## Root cause
          One sentence: where in the code the issue lives.
          ## Fix
          Bullet list — one line per file changed, explaining what was changed and why.

          2. /tmp/risk.txt — a single word: low or high.
          Write "low" if ALL of the following are true:
            - 1 or 2 files changed
            - The fix is a null guard, type safety fix, or simple value correction
            - No new functions, classes, or logic flows were added
            - No auth, database schema, or API surface was touched
          Write "high" for anything else, when in doubt use "high"

          Write ONLY the word "low" or "high" to /tmp/risk.txt, nothing else.
          EOF

      - uses: ./.github/actions/check-existing-pr
        id: pr_check
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true'
        with:
          branch-prefix: fix/issue-${{ steps.issue.outputs.number }}-

      - uses: ./.github/actions/mark-in-progress
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        with:
          issue-number: ${{ steps.issue.outputs.number }}

      - name: Run Claude Code
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DELAY=30
          for attempt in 1 2 3; do
            claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" --max-turns 20 -p "$(cat /tmp/prompt.txt)" \
              2>&1 | tee /tmp/claude_output.txt
            CLAUDE_EXIT=${PIPESTATUS[0]}
            if [[ $CLAUDE_EXIT -eq 0 ]]; then
              break
            fi
            if grep -q "529\|Overloaded\|at capacity" /tmp/claude_output.txt && [[ $attempt -lt 3 ]]; then
              echo "API overloaded (attempt $attempt/3), retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            else
              echo "claude exited with code $CLAUDE_EXIT (attempt $attempt/3), continuing"
              break
            fi
          done

      - name: Revert .github/ changes
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        run: |
          git fetch origin main
          git checkout origin/main -- .github/ 2>/dev/null || true

      - name: Verify fix with local CI
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm ci

          run_ci() {
            LINT_OK=true; TSC_OK=true; TEST_OK=true
            npm run lint > /tmp/lint_out.txt 2>&1 || LINT_OK=false
            npx tsc --noEmit > /tmp/tsc_out.txt 2>&1 || TSC_OK=false
            npm run test:coverage > /tmp/test_out.txt 2>&1 || TEST_OK=false
            [[ "$LINT_OK" == true && "$TSC_OK" == true && "$TEST_OK" == true ]]
          }

          if run_ci; then
            echo "CI_PASS=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Local CI failed — running one fix attempt"
          : > /tmp/ci_failures.txt
          if [[ "$LINT_OK" != true ]]; then
            { echo "=== lint ==="; tail -30 /tmp/lint_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi
          if [[ "$TSC_OK" != true ]]; then
            { echo "=== tsc ==="; tail -30 /tmp/tsc_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi
          if [[ "$TEST_OK" != true ]]; then
            { echo "=== tests ==="; tail -50 /tmp/test_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi

          GIT_DIFF=$(git diff HEAD 2>/dev/null | head -c 20000)
          NEW_FILES=$({ git diff --name-only; git ls-files --others --exclude-standard; } 2>/dev/null)
          {
            echo "Your fix attempt failed local CI. Fix the remaining failures."
            echo ""
            if [[ -n "$NEW_FILES" ]]; then
              echo "=== New/modified files ==="
              echo "$NEW_FILES"
              echo ""
            fi
            if [[ -n "$GIT_DIFF" ]]; then
              echo "=== Changes so far ==="
              echo "$GIT_DIFF"
              echo ""
            fi
            echo "=== CI failures to fix ==="
            cat /tmp/ci_failures.txt
            echo "Validate: npm run lint && npx tsc --noEmit && npm run test:coverage"
          } > /tmp/fix_prompt.txt

          DELAY=30
          for fix_attempt in 1 2; do
            set +eo pipefail
            claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" --max-turns 15 \
              -p "$(cat /tmp/fix_prompt.txt)" 2>&1 | tee /tmp/fix_output.txt
            set -eo pipefail
            if grep -q "529\|Overloaded\|at capacity" /tmp/fix_output.txt && [[ $fix_attempt -lt 2 ]]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
              continue
            fi
            if run_ci; then
              echo "CI_PASS=true" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "CI_PASS=false" >> "$GITHUB_ENV"
          echo "Local CI still failing after fix attempts — will open draft PR"

      - name: Open PR
        if: steps.issue.outputs.skip != 'true' && steps.sentry_details.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ID: ${{ steps.issue.outputs.sentry_id }}
        run: |
          if [[ -z $(git diff --name-only) ]]; then
            echo "No app-code fix identified — closing issue and resolving Sentry"
            gh issue comment "${ISSUE_NUMBER}" \
              --body "No application code fix identified. This error appears to be caused by factors outside the application (browser extensions, environment, etc.) and is not fixable in the codebase."
            GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" --remove-label "status: in progress" || true
            GH_TOKEN="${GH_PAT}" gh issue close "${ISSUE_NUMBER}"
            if [[ -n "${SENTRY_ID}" && -n "${SENTRY_AUTH_TOKEN}" ]]; then
              RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "https://sentry.io/api/0/issues/${SENTRY_ID}/" \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"status":"resolved"}')
              echo "Sentry resolve HTTP ${RESULT} for issue ${SENTRY_ID}"
            fi
            exit 0
          fi

          ISSUE_TITLE=$(cat /tmp/issue_title.txt)
          FILES_CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          STATS=$(git diff --shortstat)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL_LINES=$(( ${INSERTIONS:-0} + ${DELETIONS:-0} ))

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="fix/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: auto-fix attempt for issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          if [[ "${CI_PASS}" != "true" ]]; then
            # Bot could not get CI to pass — open draft PR as starting point for human
            {
              echo "Closes #${ISSUE_NUMBER}"
              echo ""
              echo "⚠️ Claude attempted a fix but local CI still fails after multiple attempts. This draft PR is a starting point — human investigation is required to complete the fix."
              if [[ -s /tmp/summary.txt ]]; then
                echo ""
                cat /tmp/summary.txt
              fi
            } > /tmp/pr_body.txt
            PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
              --draft \
              --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
              --body-file /tmp/pr_body.txt \
              --base main)
            GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual investigation required" || true
            {
              if [[ -s /tmp/summary.txt ]]; then
                cat /tmp/summary.txt
                echo ""
              fi
              echo "Claude attempted a fix but could not get CI to pass. A draft PR has been opened as a starting point: $PR_URL — human investigation required."
            } > /tmp/issue_comment.txt
            gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
          else
            # CI passes — open regular PR with risk-based auto-merge
            RISK=$(cat /tmp/risk.txt 2>/dev/null | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            RISK=${RISK:-high}
            {
              echo "Closes #${ISSUE_NUMBER}"
              echo ""
              echo "**Risk assessment:** \`${RISK}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed)"
              if [[ -s /tmp/summary.txt ]]; then
                echo ""
                cat /tmp/summary.txt
              fi
            } > /tmp/pr_body.txt
            PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
              --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
              --body-file /tmp/pr_body.txt \
              --base main)

            if [[ "$RISK" == "low" && "$FILES_CHANGED" -le 2 && "$TOTAL_LINES" -le 20 ]]; then
              # Use GH_PAT so the merge is attributed to the repo owner, allowing
              # the issues: closed event to fire and resolve-sentry-on-close to run.
              GH_TOKEN="${GH_PAT}" gh pr merge --auto --squash "$PR_URL" || true
              {
                if [[ -s /tmp/summary.txt ]]; then
                  cat /tmp/summary.txt
                  echo ""
                fi
                echo "Fix proposed and auto-merge enabled: $PR_URL — will merge to \`main\` once CI passes. Sentry will be resolved automatically when this issue closes."
              } > /tmp/issue_comment.txt
              gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
            else
              {
                if [[ -s /tmp/summary.txt ]]; then
                  cat /tmp/summary.txt
                  echo ""
                fi
                echo "A fix has been proposed: $PR_URL — please review before merging."
              } > /tmp/issue_comment.txt
              gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
            fi
          fi
