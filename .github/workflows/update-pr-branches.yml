name: Update stale PR branches

on:
  push:
    branches: [main]

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Update branches of auto-merge PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,autoMergeRequest \
            --jq '.[] | select(.autoMergeRequest != null) | .number' | \
          while read -r PR_NUM; do
            echo "Updating branch for PR #${PR_NUM}"
            gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/update-branch" \
              --method PUT 2>/dev/null || true
          done
