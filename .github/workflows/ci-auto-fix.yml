name: Auto-fix CI failures

on:
  repository_dispatch:
    types: [ci-failure]

jobs:
  auto-fix-ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-auto-fix-${{ github.event.client_payload.head_branch }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: ./.github/actions/install-claude

      - name: Get failure logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          gh run view "$RUN_ID" --log-failed 2>&1 | head -500 > /tmp/ci_logs.txt

      - name: Get branch diff vs main
        env:
          HEAD_BRANCH: ${{ github.event.client_payload.head_branch }}
        run: |
          if [[ "$HEAD_BRANCH" != "main" ]]; then
            git fetch origin main
            { git diff --stat origin/main..HEAD; echo ""; git diff origin/main..HEAD -- '*.ts' '*.tsx' '*.js' '*.json'; } | head -400 > /tmp/branch_diff.txt
          else
            touch /tmp/branch_diff.txt
          fi

      - name: Find or create GitHub issue
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.client_payload.workflow_name }}
          HEAD_BRANCH: ${{ github.event.client_payload.head_branch }}
          RUN_URL: ${{ github.event.client_payload.run_url }}
        run: |
          TITLE="CI failure: ${WORKFLOW_NAME} on ${HEAD_BRANCH}"
          printf '%s' "$TITLE" > /tmp/issue_title.txt
          EXISTING=$(gh issue list \
            --state open \
            --limit 50 \
            --json number,title | \
            jq --arg title "$TITLE" \
              '[.[] | select(.title == $title)] | .[0] // empty')
          if [[ -n "$EXISTING" ]]; then
            NUMBER=$(echo "$EXISTING" | jq -r '.number')
          else
            # Also check recently-closed issues to avoid creating a duplicate
            # when the previous run already fixed and closed the same issue.
            CLOSED=$(gh issue list \
              --state closed \
              --limit 20 \
              --json number,title | \
              jq --arg title "$TITLE" \
                '[.[] | select(.title == $title)] | .[0] // empty')
            if [[ -n "$CLOSED" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            ISSUE_URL=$(gh issue create \
              --title "$TITLE" \
              --body "**Workflow:** ${WORKFLOW_NAME}"$'\n\n'"**Branch:** \`${HEAD_BRANCH}\`"$'\n\n'"**Run:** ${RUN_URL}"$'\n\n'"This issue was automatically created from a CI failure.")
            NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          fi
          echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Write prompt
        if: steps.issue.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          WORKFLOW_NAME: ${{ github.event.client_payload.workflow_name }}
          HEAD_BRANCH: ${{ github.event.client_payload.head_branch }}
        run: |
          {
            echo "A CI workflow failed and needs to be fixed."
            echo ""
            echo "Workflow: ${WORKFLOW_NAME}"
            echo "Branch: ${HEAD_BRANCH}"
            echo "Issue: #${ISSUE_NUMBER}"
            echo ""
            echo "## Failed step logs"
            echo ""
            cat /tmp/ci_logs.txt
            echo ""
          } > /tmp/prompt.txt
          if [[ -s /tmp/branch_diff.txt ]]; then
            { echo "## Changes on this branch vs main"; echo ""; cat /tmp/branch_diff.txt; echo ""; } >> /tmp/prompt.txt
          fi
          cat >> /tmp/prompt.txt << 'EOF'
          Analyze the CI failure above. Find the root cause in the codebase and fix it.
          Do NOT run any git commands — just edit the files.
          Do NOT add code comments explaining what you changed.

          After making the fix, write two output files:

          1. /tmp/summary.txt — a markdown summary with exactly these sections:
          ## Problem
          One or two sentences: what the CI failure was and what caused it.
          ## Root cause
          One sentence: where in the code the issue lives.
          ## Fix
          Bullet list — one line per file changed, explaining what was changed and why.

          2. /tmp/risk.txt — a single word: low or high.
          Write "low" if ALL of the following are true:
            - 1 or 2 files changed
            - The fix is a null guard, type safety fix, lint error, type error, or simple value correction
            - No new functions, classes, or logic flows were added
            - No auth, database schema, or API surface was touched
          Write "high" for anything else; when in doubt use "high"

          Write ONLY the word "low" or "high" to /tmp/risk.txt, nothing else.
          EOF

      - uses: ./.github/actions/check-existing-pr
        if: steps.issue.outputs.skip != 'true'
        id: pr_check
        with:
          branch-prefix: fix/ci-issue-${{ steps.issue.outputs.number }}-

      - uses: ./.github/actions/mark-in-progress
        if: steps.issue.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        with:
          issue-number: ${{ steps.issue.outputs.number }}

      - name: Run Claude Code
        if: steps.issue.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        uses: ./.github/actions/run-claude
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify fix with local CI
        if: steps.issue.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm ci

          run_ci() {
            LINT_OK=true; TSC_OK=true; TEST_OK=true
            npm run lint > /tmp/lint_out.txt 2>&1 || LINT_OK=false
            npx tsc --noEmit > /tmp/tsc_out.txt 2>&1 || TSC_OK=false
            npm run test:coverage > /tmp/test_out.txt 2>&1 || TEST_OK=false
            [[ "$LINT_OK" == true && "$TSC_OK" == true && "$TEST_OK" == true ]]
          }

          if run_ci; then
            echo "CI_PASS=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Local CI failed — running one fix attempt"
          : > /tmp/ci_failures.txt
          if [[ "$LINT_OK" != true ]]; then
            { echo "=== lint ==="; tail -30 /tmp/lint_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi
          if [[ "$TSC_OK" != true ]]; then
            { echo "=== tsc ==="; tail -30 /tmp/tsc_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi
          if [[ "$TEST_OK" != true ]]; then
            { echo "=== tests ==="; tail -50 /tmp/test_out.txt; echo ""; } >> /tmp/ci_failures.txt
          fi

          GIT_DIFF=$(git diff HEAD 2>/dev/null | head -c 20000)
          NEW_FILES=$({ git diff --name-only; git ls-files --others --exclude-standard; } 2>/dev/null)
          {
            echo "Your fix attempt failed local CI. Fix the remaining failures."
            echo ""
            if [[ -n "$NEW_FILES" ]]; then
              echo "=== New/modified files ==="
              echo "$NEW_FILES"
              echo ""
            fi
            if [[ -n "$GIT_DIFF" ]]; then
              echo "=== Changes so far ==="
              echo "$GIT_DIFF"
              echo ""
            fi
            echo "=== CI failures to fix ==="
            cat /tmp/ci_failures.txt
            echo "Validate: npm run lint && npx tsc --noEmit && npm run test:coverage"
          } > /tmp/fix_prompt.txt

          DELAY=30
          for fix_attempt in 1 2; do
            set +eo pipefail
            claude --max-turns 15 \
              -p "$(cat /tmp/fix_prompt.txt)" 2>&1 | tee /tmp/fix_output.txt
            set -eo pipefail
            if grep -q "529\|Overloaded\|at capacity" /tmp/fix_output.txt && [[ $fix_attempt -lt 2 ]]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
              continue
            fi
            if run_ci; then
              echo "CI_PASS=true" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "CI_PASS=false" >> "$GITHUB_ENV"
          echo "Local CI still failing after fix attempts — will open draft PR"

      - name: Apply fix or open PR
        if: steps.issue.outputs.skip != 'true' && steps.pr_check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          HEAD_BRANCH: ${{ github.event.client_payload.head_branch }}
        run: |
          if [[ -z "$(git diff --name-only)" ]]; then
            # A concurrent run for the same branch may have already pushed a fix.
            # Check the latest commit on origin — if it's an auto-fix commit, close
            # this issue automatically instead of escalating to manual investigation.
            git fetch origin "${HEAD_BRANCH}" 2>/dev/null || true
            LATEST_MSG=$(git log -1 --pretty=%s "origin/${HEAD_BRANCH}" 2>/dev/null || echo "")
            if [[ "$LATEST_MSG" == *"auto-fix CI failure"* ]]; then
              gh issue comment "${ISSUE_NUMBER}" \
                --body "CI failure on \`${HEAD_BRANCH}\` was already resolved by a concurrent auto-fix run. Closing automatically."
              GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" \
                --remove-label "status: in progress" || true
              GH_TOKEN="${GH_PAT}" gh issue close "${ISSUE_NUMBER}"
            else
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Claude analyzed the CI failure but made no code changes."
              GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" \
                --remove-label "status: in progress" \
                --add-label "manual investigation required" || true
            fi
            exit 0
          fi
          ISSUE_TITLE=$(cat /tmp/issue_title.txt)
          RISK=$(cat /tmp/risk.txt 2>/dev/null | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          RISK=${RISK:-high}
          FILES_CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          STATS=$(git diff --shortstat)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL_LINES=$(( ${INSERTIONS:-0} + ${DELETIONS:-0} ))
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "$HEAD_BRANCH" != "main" ]]; then
            # CI failed on a PR branch
            if [[ "${CI_PASS}" != "true" ]]; then
              # Bot couldn't fix it — don't push broken code; flag for human
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Claude attempted a fix but local CI still fails after multiple attempts. Manual investigation required on \`${HEAD_BRANCH}\`."
              GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" \
                --remove-label "status: in progress" \
                --add-label "manual investigation required" || true
              exit 0
            fi
            # CI passes — push fix directly so CI re-runs on the same branch
            git add -A
            git commit -m "fix: auto-fix CI failure for issue #${ISSUE_NUMBER}"
            git fetch origin "${HEAD_BRANCH}"
            if ! git rebase "origin/${HEAD_BRANCH}"; then
              git rebase --abort
              gh issue comment "${ISSUE_NUMBER}" \
                --body "Auto-fix failed: rebase conflict when applying fix on top of recent changes to \`${HEAD_BRANCH}\`. Manual investigation required."
              exit 0
            fi
            COMMITS_AHEAD=$(git rev-list "origin/${HEAD_BRANCH}..HEAD" --count)
            if [[ "$COMMITS_AHEAD" -gt 0 ]]; then
              git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
              git push origin "HEAD:${HEAD_BRANCH}"
            else
              echo "Fix already applied by another run, skipping push"
            fi
            {
              if [[ -s /tmp/summary.txt ]]; then
                cat /tmp/summary.txt
                echo ""
              fi
              echo "Fix pushed to \`${HEAD_BRANCH}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed). Closes #${ISSUE_NUMBER}"
            } > /tmp/issue_comment.txt
            gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
            GH_TOKEN="${GH_PAT}" gh issue edit "${ISSUE_NUMBER}" --remove-label "status: in progress" || true
            GH_TOKEN="${GH_PAT}" gh issue close "${ISSUE_NUMBER}"
          else
            # CI failed on main — open a PR
            BRANCH="fix/ci-issue-${ISSUE_NUMBER}-$(date +%s)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "fix: auto-fix CI failure for issue #${ISSUE_NUMBER}"
            git push origin "$BRANCH"

            if [[ "${CI_PASS}" != "true" ]]; then
              # Bot couldn't fix it — open draft PR as starting point for human
              {
                echo "Closes #${ISSUE_NUMBER}"
                echo ""
                echo "⚠️ Claude attempted a fix but local CI still fails after multiple attempts. This draft PR is a starting point — human investigation is required to complete the fix."
                if [[ -s /tmp/summary.txt ]]; then
                  echo ""
                  cat /tmp/summary.txt
                fi
              } > /tmp/pr_body.txt
              PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
                --draft \
                --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
                --body-file /tmp/pr_body.txt \
                --base main)
              GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual investigation required" || true
              {
                if [[ -s /tmp/summary.txt ]]; then
                  cat /tmp/summary.txt
                  echo ""
                fi
                echo "Claude attempted a fix but could not get CI to pass. A draft PR has been opened as a starting point: $PR_URL — human investigation required."
              } > /tmp/issue_comment.txt
              gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
            else
              # CI passes — open regular PR with risk-based auto-merge
              {
                echo "Closes #${ISSUE_NUMBER}"
                echo ""
                echo "**Risk assessment:** \`${RISK}\` (${FILES_CHANGED} file(s), ${TOTAL_LINES} lines changed)"
                if [[ -s /tmp/summary.txt ]]; then
                  echo ""
                  cat /tmp/summary.txt
                fi
              } > /tmp/pr_body.txt
              PR_URL=$(GH_TOKEN="${GH_PAT}" gh pr create \
                --title "${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
                --body-file /tmp/pr_body.txt \
                --base main)
              if [[ "$RISK" == "low" && "$FILES_CHANGED" -le 2 && "$TOTAL_LINES" -le 20 ]]; then
                GH_TOKEN="${GH_PAT}" gh pr merge --auto --squash "$PR_URL" || true
                {
                  if [[ -s /tmp/summary.txt ]]; then
                    cat /tmp/summary.txt
                    echo ""
                  fi
                  echo "Fix proposed and auto-merge enabled: $PR_URL — will merge to \`main\` once CI passes."
                } > /tmp/issue_comment.txt
                gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
              else
                GH_TOKEN="${GH_PAT}" gh pr edit "$PR_URL" --add-label "manual merge required" || true
                {
                  if [[ -s /tmp/summary.txt ]]; then
                    cat /tmp/summary.txt
                    echo ""
                  fi
                  echo "A fix has been proposed: $PR_URL — please review before merging."
                } > /tmp/issue_comment.txt
                gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt
              fi
            fi
          fi
